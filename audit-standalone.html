<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MUSCLE_MODEL Audit — Standalone</title>
<style>
:root{--bg:#0a0e14;--s1:#151b23;--b1:#2a3544;--red:#e63946;--grn:#2a9d8f;--gold:#f4a261;--tx:#e8ecf1;--tx2:#a8b3c4}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:system-ui;padding:16px}
h1{font-size:18px;margin-bottom:12px;color:var(--grn)}
.banner{background:linear-gradient(90deg,#1a2332,#0d1219);border:1px solid var(--b1);border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:13px}
.banner strong{color:var(--grn)}
table{border-collapse:collapse;width:100%;margin:8px 0;font-size:11px}
th,td{border:1px solid var(--b1);padding:6px 8px;text-align:left}
th{background:var(--s1);font-weight:600}
.fallback{background:rgba(230,57,70,.15)}
.compound{background:rgba(244,162,97,.1)}
#OUTPUT{min-height:100px}
</style>
</head>
<body>
<h1>MUSCLE_MODEL Audit</h1>
<div class="banner">
  <strong>No server needed.</strong> Double-click this file to open. All data is embedded.
</div>
<div id="OUTPUT">Running audit…</div>

<script>
(function(){
  const BODY_MAP=[{parts:['quads'],keys:['Squat','Leg Press','Leg Extension','Belt Squat','Pendulum','Bulgarian Split']},{parts:['hamstrings'],keys:['Deadlift','Leg Curl','Nordic','RDL','Stiff Leg']},{parts:['calves'],keys:['Calf Raise']},{parts:['glutes'],keys:['Hip Abductor','Hip Thrust']},{parts:['chest'],keys:['Bench','Press','Fly','Pec Deck','Incline']},{parts:['back'],keys:['Pull','Row','Pullover','Lat Pulldown']},{parts:['biceps'],keys:['Curl','Spider','Preacher']},{parts:['triceps'],keys:['Pushdown','Skull','Extension','Dip','Close Grip']},{parts:['delts'],keys:['Lateral Raise','Face Pull','Rear Delt']}];
  function getBodyPart(exName){const n=(exName||'').toLowerCase();for(const {parts,keys} of BODY_MAP){if(keys.some(k=>n.includes(k.toLowerCase())))return parts[0];}return 'other';}
  const MUSCLE_MODEL=[{keys:['Bench','Press'],muscles:{chest:.6,triceps:.25,delts:.15},len:1},{keys:['Incline'],muscles:{chest:.55,triceps:.2,delts:.25},len:1.05},{keys:['Fly','Pec Deck'],muscles:{chest:.9},len:1.1},{keys:['Pull-Up','Pullup','Pull Up','Lat Pulldown'],muscles:{back:.6,biceps:.25,delts:.15},len:1.05},{keys:['Row','Pullover'],muscles:{back:.7,biceps:.2,delts:.1},len:1.05},{keys:['Face Pull','Rear Delt'],muscles:{delts:.85},len:1},{keys:['Hack Squat','Leg Press','Belt Squat','Pendulum Squat','Bulgarian Split'],muscles:{quads:.7,glutes:.25,hamstrings:.05},len:1},{keys:['Leg Extension'],muscles:{quads:.95},len:1.08},{keys:['Single Leg Press'],muscles:{quads:.65,glutes:.3},len:1.05},{keys:['RDL','Romanian Deadlift'],muscles:{hamstrings:.6,glutes:.3,back:.1},len:1.1},{keys:['Stiff Leg Deadlift','Nordic','Leg Curl'],muscles:{hamstrings:.9},len:1.05},{keys:['Curl'],muscles:{biceps:.8},len:1},{keys:['Incline Dumbbell Curl','Incline Curl'],muscles:{biceps:.95},len:1.1},{keys:['Hammer Curl'],muscles:{biceps:.5},len:1},{keys:['Close Grip','Skull','Pushdown','Extension','Overhead Extension','Dip'],muscles:{triceps:.9},len:1},{keys:['Lateral Raise'],muscles:{delts:.95},len:1.05},{keys:['Calf Raise'],muscles:{calves:1},len:1},{keys:['Hip Abductor','Hip Thrust'],muscles:{glutes:.9},len:1}];
  function getMuscleWeights(exName){const n=(exName||'').toLowerCase();for(const {keys,muscles} of MUSCLE_MODEL){if(keys.some(k=>n.includes(k.toLowerCase())))return muscles;}const bp=getBodyPart(exName);return bp&&bp!=='other'?{[bp]:1}:{};}
  const EL=[{n:'Hack Squat',m:'Quads'},{n:'Leg Press',m:'Quads'},{n:'Belt Squat',m:'Quads'},{n:'Bulgarian Split Squat',m:'Quads'},{n:'Pendulum Squat',m:'Quads'},{n:'Leg Extension',m:'Quads — Rectus Femoris'},{n:'Single Leg Press',m:'Quads'},{n:'Romanian Deadlift',m:'Hamstrings'},{n:'Nordic Hamstring Curl',m:'Hamstrings'},{n:'Lying Leg Curl',m:'Hamstrings'},{n:'Seated Leg Curl',m:'Hamstrings'},{n:'Stiff Leg Deadlift',m:'Hamstrings'},{n:'Standing Calf Raise',m:'Calves — Gastroc'},{n:'Seated Calf Raise',m:'Calves — Soleus'},{n:'Hip Abductor Machine',m:'Glutes'},{n:'Hip Thrust',m:'Glutes'},{n:'Barbell Bench Press',m:'Chest'},{n:'Incline Barbell Press',m:'Chest — Upper'},{n:'Incline Dumbbell Press',m:'Chest — Upper'},{n:'Plate Loaded Incline Machine Press',m:'Chest — Upper'},{n:'Dumbbell Bench Press',m:'Chest'},{n:'Cable Fly',m:'Chest'},{n:'Pec Deck',m:'Chest'},{n:'Weighted Pull-Up',m:'Back — Lats'},{n:'Lat Pulldown',m:'Back — Lats'},{n:'Plate Loaded Machine Row',m:'Back — Mid'},{n:'Barbell Row',m:'Back — Mid'},{n:'Dumbbell Row',m:'Back — Mid'},{n:'Lat Pullover',m:'Back — Lats'},{n:'Face Pull',m:'Rear Delt'},{n:'Barbell Curl',m:'Biceps'},{n:'EZ Bar Curl',m:'Biceps'},{n:'Incline Dumbbell Curl',m:'Biceps — Long Head'},{n:'Cable Curl',m:'Biceps'},{n:'Hammer Curl',m:'Brachialis'},{n:'Cable Hammer Curl',m:'Brachialis'},{n:'Spider Curl',m:'Biceps — Short'},{n:'Preacher Curl',m:'Biceps — Short'},{n:'Close Grip Bench Press',m:'Triceps'},{n:'Weighted Dip',m:'Triceps'},{n:'Skull Crusher',m:'Triceps'},{n:'Overhead Tricep Extension',m:'Triceps — Long'},{n:'Dumbbell Overhead Extension',m:'Triceps — Long'},{n:'Cable Pushdown',m:'Triceps'},{n:'Lateral Raise Machine',m:'Delts — Mid'},{n:'Dumbbell Lateral Raise',m:'Delts — Mid'},{n:'Rear Delt Fly',m:'Delts — Post'}];

  function getMatchedKeys(exName){const n=(exName||'').toLowerCase();for(const {keys} of MUSCLE_MODEL){if(keys.some(k=>n.includes(k.toLowerCase())))return keys.join(', ');}return null;}
  function isCompound(exName){const mw=getMuscleWeights(exName);return Object.keys(mw||{}).length>1;}

  const rows=[];let fallbackCount=0;
  for(const e of EL){const name=e.n||e.name||'?';const mw=getMuscleWeights(name);const matchedKeys=getMatchedKeys(name);const isFallback=matchedKeys===null;if(isFallback)fallbackCount++;const weightsStr=Object.entries(mw||{}).sort((a,b)=>b[1]-a[1]).map(([m,w])=>m+':'+w).join(', ');rows.push({name,matchedKeys:matchedKeys||'(fallback)',weights:weightsStr,fallback:isFallback,compound:isCompound(name)});}

  const pct=((fallbackCount/rows.length)*100).toFixed(0);
  let html='<p><strong>'+rows.length+'</strong> exercises | <strong>'+fallbackCount+'</strong> fallback ('+pct+'%). Prioritize compounds.</p><table><thead><tr><th>Name</th><th>Matched Keys</th><th>Weights</th><th>Fallback</th><th>Compound</th></tr></thead><tbody>';
  rows.forEach(r=>{const fc=r.fallback?' class="fallback"':'';const cc=r.compound?' class="compound"':'';html+='<tr'+fc+cc+'><td>'+r.name+'</td><td>'+r.matchedKeys+'</td><td>'+r.weights+'</td><td>'+(r.fallback?'YES':'')+'</td><td>'+(r.compound?'Y':'')+'</td></tr>';});
  html+='</tbody></table>';
  document.getElementById('OUTPUT').innerHTML=html;
})();
</script>
</body>
</html>
