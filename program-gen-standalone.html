<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Program Generator — Standalone</title>
<style>
:root{--bg:#0a0e14;--s1:#151b23;--b1:#2a3544;--grn:#2a9d8f;--gold:#f4a261;--tx:#e8ecf1;--tx2:#a8b3c4}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:system-ui;padding:16px}
h1{font-size:18px;margin-bottom:12px;color:var(--grn)}
.banner{background:linear-gradient(90deg,#1a2332,#0d1219);border:1px solid var(--b1);border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:13px}
.banner strong{color:var(--grn)}
.controls{margin-bottom:16px;display:flex;gap:12px;flex-wrap:wrap}
.controls button{background:var(--grn);color:#111;border:none;padding:10px 20px;border-radius:6px;font-weight:700;cursor:pointer}
.day-block{margin-bottom:12px;border:1px solid var(--b1);border-radius:8px;overflow:hidden}
.day-hdr{background:var(--s1);padding:10px 14px;font-weight:700}
.day-hdr.rest{color:var(--tx2)}
.ex-row{padding:8px 14px;border-top:1px solid var(--b1);font-size:12px}
.ex-row .name{font-weight:600}
.ex-row .meta{font-size:11px;color:var(--tx2);margin-left:8px}
#OUTPUT{min-height:100px}
</style>
</head>
<body>
<h1>Program Generator — Dry Run</h1>
<div class="banner">
  <strong>No server needed.</strong> Double-click this file to open. All data is embedded.
</div>
<div class="controls">
  <button onclick="run()">Generate Program</button>
</div>
<div id="OUTPUT">Click "Generate Program" to run.</div>

<script>
(function(){
  const BODY_MAP=[{parts:['quads'],keys:['Squat','Leg Press','Leg Extension','Belt Squat','Pendulum','Bulgarian Split']},{parts:['hamstrings'],keys:['Deadlift','Leg Curl','Nordic','RDL','Stiff Leg']},{parts:['calves'],keys:['Calf Raise']},{parts:['glutes'],keys:['Hip Abductor','Hip Thrust']},{parts:['chest'],keys:['Bench','Press','Fly','Pec Deck','Incline']},{parts:['back'],keys:['Pull','Row','Pullover','Lat Pulldown']},{parts:['biceps'],keys:['Curl','Spider','Preacher']},{parts:['triceps'],keys:['Pushdown','Skull','Extension','Dip','Close Grip']},{parts:['delts'],keys:['Lateral Raise','Face Pull','Rear Delt']}];
  function getBodyPart(exName){const n=(exName||'').toLowerCase();for(const {parts,keys} of BODY_MAP){if(keys.some(k=>n.includes(k.toLowerCase())))return parts[0];}return 'other';}
  const MUSCLE_MODEL=[{keys:['Bench','Press'],muscles:{chest:.6,triceps:.25,delts:.15},len:1},{keys:['Incline'],muscles:{chest:.55,triceps:.2,delts:.25},len:1.05},{keys:['Fly','Pec Deck'],muscles:{chest:.9},len:1.1},{keys:['Pull-Up','Pullup','Pull Up','Lat Pulldown'],muscles:{back:.6,biceps:.25,delts:.15},len:1.05},{keys:['Row','Pullover'],muscles:{back:.7,biceps:.2,delts:.1},len:1.05},{keys:['Face Pull','Rear Delt'],muscles:{delts:.85},len:1},{keys:['Hack Squat','Leg Press','Belt Squat','Pendulum Squat','Bulgarian Split'],muscles:{quads:.7,glutes:.25,hamstrings:.05},len:1},{keys:['Leg Extension'],muscles:{quads:.95},len:1.08},{keys:['Single Leg Press'],muscles:{quads:.65,glutes:.3},len:1.05},{keys:['RDL','Romanian Deadlift'],muscles:{hamstrings:.6,glutes:.3,back:.1},len:1.1},{keys:['Stiff Leg Deadlift','Nordic','Leg Curl'],muscles:{hamstrings:.9},len:1.05},{keys:['Curl'],muscles:{biceps:.8},len:1},{keys:['Incline Dumbbell Curl','Incline Curl'],muscles:{biceps:.95},len:1.1},{keys:['Hammer Curl'],muscles:{biceps:.5},len:1},{keys:['Close Grip','Skull','Pushdown','Extension','Overhead Extension','Dip'],muscles:{triceps:.9},len:1},{keys:['Lateral Raise'],muscles:{delts:.95},len:1.05},{keys:['Calf Raise'],muscles:{calves:1},len:1},{keys:['Hip Abductor','Hip Thrust'],muscles:{glutes:.9},len:1}];
  function getMuscleWeights(exName){const n=(exName||'').toLowerCase();for(const {keys,muscles} of MUSCLE_MODEL){if(keys.some(k=>n.includes(k.toLowerCase())))return muscles;}const bp=getBodyPart(exName);return bp&&bp!=='other'?{[bp]:1}:{};}
  function getLengthBias(exName){const n=(exName||'').toLowerCase();for(const {keys,len} of MUSCLE_MODEL){if(keys.some(k=>n.includes(k.toLowerCase())))return len||1;}return 1;}
  const EL=[{n:'Hack Squat',m:'Quads'},{n:'Leg Press',m:'Quads'},{n:'Belt Squat',m:'Quads'},{n:'Bulgarian Split Squat',m:'Quads'},{n:'Pendulum Squat',m:'Quads'},{n:'Leg Extension',m:'Quads — Rectus Femoris'},{n:'Single Leg Press',m:'Quads'},{n:'Romanian Deadlift',m:'Hamstrings'},{n:'Nordic Hamstring Curl',m:'Hamstrings'},{n:'Lying Leg Curl',m:'Hamstrings'},{n:'Seated Leg Curl',m:'Hamstrings'},{n:'Stiff Leg Deadlift',m:'Hamstrings'},{n:'Standing Calf Raise',m:'Calves — Gastroc'},{n:'Seated Calf Raise',m:'Calves — Soleus'},{n:'Hip Abductor Machine',m:'Glutes'},{n:'Hip Thrust',m:'Glutes'},{n:'Barbell Bench Press',m:'Chest'},{n:'Incline Barbell Press',m:'Chest — Upper'},{n:'Incline Dumbbell Press',m:'Chest — Upper'},{n:'Plate Loaded Incline Machine Press',m:'Chest — Upper'},{n:'Dumbbell Bench Press',m:'Chest'},{n:'Cable Fly',m:'Chest'},{n:'Pec Deck',m:'Chest'},{n:'Weighted Pull-Up',m:'Back — Lats'},{n:'Lat Pulldown',m:'Back — Lats'},{n:'Plate Loaded Machine Row',m:'Back — Mid'},{n:'Barbell Row',m:'Back — Mid'},{n:'Dumbbell Row',m:'Back — Mid'},{n:'Lat Pullover',m:'Back — Lats'},{n:'Face Pull',m:'Rear Delt'},{n:'Barbell Curl',m:'Biceps'},{n:'EZ Bar Curl',m:'Biceps'},{n:'Incline Dumbbell Curl',m:'Biceps — Long Head'},{n:'Cable Curl',m:'Biceps'},{n:'Hammer Curl',m:'Brachialis'},{n:'Cable Hammer Curl',m:'Brachialis'},{n:'Spider Curl',m:'Biceps — Short'},{n:'Preacher Curl',m:'Biceps — Short'},{n:'Close Grip Bench Press',m:'Triceps'},{n:'Weighted Dip',m:'Triceps'},{n:'Skull Crusher',m:'Triceps'},{n:'Overhead Tricep Extension',m:'Triceps — Long'},{n:'Dumbbell Overhead Extension',m:'Triceps — Long'},{n:'Cable Pushdown',m:'Triceps'},{n:'Lateral Raise Machine',m:'Delts — Mid'},{n:'Dumbbell Lateral Raise',m:'Delts — Mid'},{n:'Rear Delt Fly',m:'Delts — Post'}];
  const P={mon:{focus:'Legs — Quad Focus (Heavy)',exercises:[{name:'Hack Squat',sets:5,reps:'6–8',type:'h'},{name:'Single Leg Press',sets:3,reps:'10–12',type:'s'},{name:'Leg Extension',sets:3,reps:'12–15',type:'d'},{name:'Seated Leg Curl',sets:3,reps:'10–12',type:'n'},{name:'Standing Calf Raise',sets:4,reps:'12–15',type:'s'},{name:'Seated Calf Raise',sets:3,reps:'15–20',type:'n'}]},tue:{focus:'Chest & Back — Full Upper',exercises:[{name:'Barbell Bench Press',sets:4,reps:'3–5',type:'h'},{name:'Incline Dumbbell Press',sets:3,reps:'8–10',type:'n'},{name:'Cable Fly',sets:3,reps:'12–15',type:'n'},{name:'Weighted Pull-Up',sets:4,reps:'6–8',type:'h'},{name:'Plate Loaded Machine Row',sets:3,reps:'8–10',type:'n'},{name:'Lat Pullover',sets:3,reps:'12–15',type:'s'},{name:'Face Pull',sets:3,reps:'15–20',type:'n'}]},wed:{focus:'Arms + Delts',exercises:[{name:'Barbell Curl',sets:4,reps:'6–8',type:'h'},{name:'Incline Dumbbell Curl',sets:3,reps:'10–12',type:'s'},{name:'Cable Hammer Curl',sets:3,reps:'12–15',type:'n'},{name:'Close Grip Bench Press',sets:4,reps:'6–8',type:'h'},{name:'Overhead Tricep Extension',sets:3,reps:'10–12',type:'s'},{name:'Cable Pushdown',sets:3,reps:'12–15',type:'d'},{name:'Lateral Raise Machine',sets:4,reps:'15–20',type:'n'},{name:'Rear Delt Fly',sets:3,reps:'15–20',type:'n'}]},thu:{focus:'Legs — Posterior Chain Heavy',exercises:[{name:'Belt Squat',sets:4,reps:'6–8',type:'h'},{name:'Romanian Deadlift',sets:4,reps:'8–10',type:'s'},{name:'Nordic Hamstring Curl',sets:3,reps:'8–10',type:'s'},{name:'Leg Press',sets:3,reps:'15–20',type:'s'},{name:'Leg Extension',sets:2,reps:'12–15',type:'n'},{name:'Hip Abductor Machine',sets:3,reps:'15–20',type:'n'},{name:'Standing Calf Raise',sets:4,reps:'10–12',type:'s'},{name:'Seated Calf Raise',sets:3,reps:'15–20',type:'n'}]},fri:{rest:true,exercises:[]},sat:{focus:'Chest & Arms — Arm Priority',exercises:[{name:'Incline Barbell Press',sets:3,reps:'6–8',type:'h'},{name:'Cable Fly',sets:3,reps:'15–20',type:'n'},{name:'Hammer Curl',sets:4,reps:'6–8',type:'h'},{name:'Cable Curl',sets:3,reps:'10–12',type:'n'},{name:'Incline Dumbbell Curl',sets:3,reps:'12–15',type:'s'},{name:'Spider Curl',sets:3,reps:'12–15',type:'n'},{name:'Skull Crusher',sets:4,reps:'8–10',type:'h'},{name:'Dumbbell Overhead Extension',sets:3,reps:'10–12',type:'s'}]},sun:{focus:'Legs — Volume (Metabolic Stress)',exercises:[{name:'Leg Press',sets:4,reps:'15–20',type:'s'},{name:'Hack Squat',sets:3,reps:'10–12',type:'n'},{name:'Leg Extension',sets:4,reps:'15–20',type:'d'},{name:'Stiff Leg Deadlift',sets:3,reps:'12–15',type:'n'},{name:'Lying Leg Curl',sets:4,reps:'12–15',type:'n'},{name:'Hip Abductor Machine',sets:3,reps:'15–20',type:'n'},{name:'Standing Calf Raise',sets:4,reps:'15–20',type:'s'}]}};
  const DAY_NAMES={mon:'Monday',tue:'Tuesday',wed:'Wednesday',thu:'Thursday',fri:'Friday',sat:'Saturday',sun:'Sunday'};
  const DO=['mon','tue','wed','thu','fri','sat','sun'];
  const MUSCLES=['quads','hamstrings','calves','glutes','chest','back','biceps','triceps','delts'];
  const SPLIT={musclePerDay:[['quads','hamstrings','calves','glutes'],['chest','back','delts'],['biceps','triceps','delts'],['quads','hamstrings','calves','glutes'],['chest','biceps','triceps','delts'],['quads','hamstrings','calves','glutes']],dayKeys:['mon','tue','wed','thu','sat','sun']};

  function getBodyPartFromMuscle(m){if(!m)return 'other';const x=(m||'').toLowerCase();for(const bp of MUSCLES){if(x.includes(bp))return bp;}if(x.includes('quad')||x.includes('rectus'))return 'quads';if(x.includes('ham'))return 'hamstrings';if(x.includes('calf')||x.includes('gastroc')||x.includes('soleus'))return 'calves';if(x.includes('glute')||x.includes('hip abd'))return 'glutes';if(x.includes('pec')||x.includes('upper'))return 'chest';if(x.includes('lat')||x.includes('rhomb')||x.includes('trap'))return 'back';if(x.includes('bicep')||x.includes('brachialis'))return 'biceps';if(x.includes('tricep'))return 'triceps';if(x.includes('delt')||x.includes('shoulder'))return 'delts';return 'other';}
  function getPrimaryMuscle(m){if(!m||!Object.keys(m).length)return null;return Object.entries(m).sort((a,b)=>b[1]-a[1])[0][0];}
  function isCompound(m){if(!m)return false;return Object.keys(m).filter(x=>(m[x]||0)>0).length>1;}

  function getExercisesForBodyPart(bp,exclude,stalledSet){
    const pool=EL.filter(e=>{const name=e.n||e.name;if(!name||name===exclude)return false;const elBp=getBodyPartFromMuscle(e.m);if(elBp!=='other')return elBp===bp;const nameBp=getBodyPart(name);return nameBp===bp;});
    return pool.map(e=>{const name=e.n||e.name;const mw=getMuscleWeights(name);const lb=getLengthBias(name);return{name,mw,lb,compound:isCompound(mw),primary:getPrimaryMuscle(mw),stalled:stalledSet&&stalledSet.has(name)};}).sort((a,b)=>{if(a.stalled&&!b.stalled)return 1;if(!a.stalled&&b.stalled)return-1;if(a.compound&&!b.compound)return-1;if(!a.compound&&b.compound)return 1;return(b.lb||1)-(a.lb||1);});
  }

  function selectExercisesForDay(dayMuscles,stalledMap,maxPer){
    const exercises=[];const used=new Set();const maxEx=maxPer||2;
    for(const muscle of dayMuscles){const stalled=stalledMap&&stalledMap[muscle]?new Set(stalledMap[muscle]):new Set();const pool=getExercisesForBodyPart(muscle,null,stalled).filter(e=>!used.has(e.name));let chosen=0;for(const e of pool){if(chosen>=maxEx)break;if(!e.stalled){exercises.push({name:e.name,muscle,primary:e.primary,compound:e.compound,mw:e.mw});used.add(e.name);chosen++;}}}
    return exercises;
  }

  function dryRun(){
    const muscleFocus={};SPLIT.dayKeys.forEach((dk,i)=>muscleFocus[dk]=SPLIT.musclePerDay[i]);
    const weekProgram={days:[],archetype:'adam-6'};
    for(const dk of DO){
      const muscles=muscleFocus[dk];
      if(dk==='fri'||!muscles){weekProgram.days.push({dk,name:DAY_NAMES[dk],rest:true,focus:'Rest & Recovery',exercises:[]});continue;}
      const templateDay=P[dk];const templateExMap={};if(templateDay&&templateDay.exercises)templateDay.exercises.forEach(ex=>templateExMap[ex.name]=ex);
      let dayExs=selectExercisesForDay(muscles,{},2);
      const typeOrder={h:0,n:1,s:2,d:3};
      dayExs.sort((a,b)=>{if(a.compound&&!b.compound)return-1;if(!a.compound&&b.compound)return 1;const ta=typeOrder[templateExMap[a.name]?.type||'n']??1;const tb=typeOrder[templateExMap[b.name]?.type||'n']??1;return ta-tb;});
      const exercises=dayExs.map(ex=>{const t=templateExMap[ex.name];return{name:ex.name,sets:t?t.sets||3:3,reps:t?t.reps||'8–12':'8–12',type:t?t.type||'n':'n',muscle:ex.muscle,primary:ex.primary,progressionRule:'add 5 lb when 2 sets hit top of range'};});
      weekProgram.days.push({dk,name:DAY_NAMES[dk],rest:false,focus:templateDay?templateDay.focus:muscles.join(' + '),exercises});
    }
    return weekProgram;
  }

  window.run=function(){
    try{
      const wp=dryRun();
      let html='<p><strong>Archetype:</strong> '+wp.archetype+'</p>';
      wp.days.forEach(d=>{
        const cls=d.rest?'rest':'';
        html+='<div class="day-block"><div class="day-hdr '+cls+'">'+d.name+' — '+(d.focus||'')+'</div>';
        if(d.exercises&&d.exercises.length)d.exercises.forEach(ex=>html+='<div class="ex-row"><span class="name">'+ex.name+'</span><span class="meta">'+ex.sets+'×'+ex.reps+' | '+ex.muscle+'</span></div>');
        html+='</div>';
      });
      document.getElementById('OUTPUT').innerHTML=html;
    }catch(e){document.getElementById('OUTPUT').innerHTML='<p style="color:#e63946">Error: '+e.message+'</p>';}
  };
})();
</script>
</body>
</html>
