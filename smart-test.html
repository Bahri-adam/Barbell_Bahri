<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Tab Test — Offline</title>
<style>
:root{--bg:#0a0e14;--bg2:#0f1419;--s1:#151b23;--s2:#1c2430;--b1:#2a3544;--b2:#364556;--red:#e63946;--blue:#457b9d;--blue2:#6ec1e3;--gold:#f4a261;--grn:#2a9d8f;--grn2:#52b788;--tx:#e8ecf1;--tx2:#a8b3c4;--tx3:#6b7a8f;--fd:'Barlow Condensed',sans-serif;--fb:'Barlow',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:var(--fb);padding:16px;padding-bottom:40px}
.test-banner{background:linear-gradient(90deg,var(--red),#c1121f);color:#fff;padding:12px 16px;margin-bottom:16px;border-radius:8px;font-size:12px;font-weight:600}
.test-banner strong{display:block;margin-bottom:4px;font-size:14px}
.test-controls{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:16px;align-items:flex-end}
.test-controls label{display:flex;flex-direction:column;gap:4px;font-size:11px;color:var(--tx3)}
.test-controls select{background:var(--s2);border:1px solid var(--b2);border-radius:4px;color:var(--tx);padding:8px 12px;font-size:13px;min-width:200px}
.custom-ex-input{font-family:var(--fb)}
.smart-body{padding:0}
.smart-card{background:var(--s1);border:1px solid var(--b1);border-radius:8px;padding:14px 16px;margin-bottom:12px}
.smart-hdr{font-family:var(--fd);font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;color:var(--tx)}
.smart-phase{font-size:11px;color:var(--tx3);margin-bottom:8px}
.smart-verdict{font-size:12px;color:var(--tx2);line-height:1.6;margin-top:8px;padding:10px;background:var(--s2);border-radius:6px;border-left:3px solid var(--blue)}
.smart-meta{font-size:10px;color:var(--tx3);margin-top:6px}
.smart-day{display:flex;align-items:center;gap:8px;padding:8px 10px;margin-bottom:4px;border-radius:5px;font-size:12px}
.smart-day.rest{background:var(--s2);color:var(--tx3)}
.smart-day.workout{background:var(--s2);border-left:3px solid var(--blue)}
.smart-day-name{font-weight:600;min-width:70px;color:var(--tx)}
.smart-day-focus{flex:1;font-size:11px;color:var(--tx2)}
.smart-day-done{color:var(--grn2);font-weight:700}
.smart-rec{font-size:12px;color:var(--tx2);line-height:1.6;padding:8px 10px;margin-bottom:6px;border-radius:5px;background:var(--s2)}
.smart-rec.add,.smart-rec.hold{border-left:3px solid var(--gold)}
.smart-rec.stall{border-left:3px solid var(--gold)}
.smart-rec.warn{border-left:3px solid var(--red)}
.smart-rec.learned{border-left:3px solid var(--grn2)}
.smart-rec.info{border-left:3px solid var(--blue)}
.smart-rec.none{border-left:3px solid var(--grn2)}
.smart-note{font-size:10px;color:var(--tx3)}
.smart-disclaimer{font-size:11px;color:var(--tx3);margin-top:8px;padding:8px 10px;background:rgba(69,123,157,.1);border-radius:5px;border-left:3px solid var(--blue)}
.smart-sub{font-size:11px;color:var(--tx3);margin-bottom:10px}
.smart-metrics{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-top:8px}
.smart-metric{font-size:11px;color:var(--tx2);padding:6px 8px;background:var(--s2);border-radius:4px;border-left:3px solid var(--blue)}
.smart-day-block{border:1px solid var(--b1);border-radius:6px;margin-bottom:8px;overflow:hidden}
.smart-day-block-hdr{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--s2);cursor:pointer;font-size:12px}
.smart-day-block-hdr .smart-toggle{font-size:10px;color:var(--tx3);margin-left:auto}
.smart-day-block.open .smart-day-block-hdr .smart-toggle{transform:rotate(180deg)}
.smart-day-block-body{display:none;padding:10px 12px;border-top:1px solid var(--b1)}
.smart-day-block.open .smart-day-block-body{display:block}
.smart-ex-row{background:var(--s2);border-radius:5px;padding:10px 12px;margin-bottom:8px;border-left:3px solid var(--b1)}
.smart-ex-name{font-weight:700;font-size:13px;margin-bottom:4px}
.smart-mod{display:inline-block;font-size:10px;padding:3px 6px;border-radius:3px;margin-bottom:4px;font-weight:600}
.smart-mod.drop-set{background:rgba(244,162,97,.2);color:var(--gold)}
.smart-mod.drop-weight{background:rgba(230,57,70,.15);color:var(--red)}
.smart-mod.go-full,.smart-mod.add-set{background:rgba(42,157,143,.2);color:var(--grn2)}
.smart-mod.swap-or-vary{background:rgba(69,123,157,.2);color:var(--blue2)}
.smart-pvr{font-size:11px;margin-top:6px;padding:6px 8px;background:var(--s2);border-radius:4px;border-left:3px solid var(--blue)}
.smart-pvr-program{color:var(--tx3)}
.smart-pvr-rec{color:var(--grn2);font-weight:600}
.smart-pvr-why{font-size:10px;color:var(--tx3);display:block;margin-top:2px}
.smart-ex-tip{font-size:11px;color:var(--tx2);line-height:1.5;margin-top:4px;padding-left:6px}
.smart-ex-tip.cross_day{border-left:2px solid var(--blue)}
.smart-ex-tip.same_muscle,.smart-ex-tip.stall{border-left:2px solid var(--gold)}
.smart-ex-tip.priority,.smart-ex-tip.add{border-left:2px solid var(--grn2)}
.smart-ex-tip.fatigue{border-left:2px solid var(--red)}
.smart-swaps{font-size:10px;color:var(--tx3);margin-top:4px;font-style:italic}
.smart-card.cite .smart-cites{margin:0;padding-left:18px;font-size:11px;color:var(--tx3);line-height:1.8}
.smart-princ{font-size:10px;color:var(--tx3);margin-top:10px;padding:8px;background:var(--s2);border-radius:4px;line-height:1.5}
</style>
</head>
<body>
<div class="test-banner">
  <strong>🧪 Smart Tab Test — Offline</strong>
  Uses fictional data only. Your real app data is never touched.
</div>
<div class="test-controls">
  <label>Scenario <select id="SCEN_SEL" onchange="applyScenario(true)"></select></label>
  <label>Week <select id="WK_SEL" onchange="applyScenario(false)"></select></label>
  <button id="RUN_ALL_BTN" onclick="runAllAthletes()" style="background:var(--gold);color:#111;border:none;padding:10px 16px;border-radius:6px;font-weight:700;cursor:pointer">▶ Run All Athletes &amp; Generate Output</button>
</div>
<div class="smart-body" id="SMB"></div>
<div id="OUTPUT_PANEL" style="display:none;margin-top:20px">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <strong style="color:var(--grn2)">Full output — select all and copy to paste into Claude</strong>
    <button onclick="copyOutput()" style="background:var(--blue);color:#fff;border:none;padding:6px 12px;border-radius:4px;cursor:pointer">Copy to clipboard</button>
  </div>
  <textarea id="OUTPUT_TA" readonly style="width:100%;min-height:400px;background:#111;color:#ddd;font-family:monospace;font-size:11px;padding:12px;border:1px solid var(--b2);border-radius:6px;line-height:1.5"></textarea>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// MOCK SCENARIOS — Fictional athlete data to stress-test Smart logic
// Log format: {date, dk, dn, wk, bl, ex, sn, w, r, rpe, e1rm}
// ═══════════════════════════════════════════════════════════
function mk(override){
  const base={date:'2025-02-10',dk:'mon',dn:'Monday',wk:1,bl:1,ex:'Hack Squat',sn:1,w:200,r:8,rpe:8,e1rm:253};
  const r={...base,...override};
  if(r.w&&r.r&&!r.e1rm)r.e1rm=Math.round(r.w*(1+r.r/30));
  return r;
}
const SCENARIOS=[
  {id:'empty',name:'1. Empty — New user (no logs)',logs:[],desc:'Tests behavior with zero data'},
  {id:'week1-partial',name:'2. Week 1 partial — Mon/Tue only, low RPE',logs:[
    ...Array.from({length:15},(_,i)=>mk({dk:'mon',dn:'Monday',sn:i+1,ex:['Hack Squat','Single Leg Press','Leg Extension','Seated Leg Curl','Standing Calf Raise'][Math.floor(i/3)],w:150+i*10,r:8,rpe:6})),
    ...Array.from({length:12},(_,i)=>mk({date:'2025-02-11',dk:'tue',dn:'Tuesday',sn:i+1,ex:['Barbell Bench Press','Incline Dumbbell Press','Cable Fly','Weighted Pull-Up'][Math.floor(i/3)],w:180,r:8,rpe:7})),
  ],desc:'Under volume, no RPE 7+ on many sets'},
  {id:'week5-full',name:'3. Week 5 full — All days, good RPE',logs:requireFullWeek(5),desc:'On track, full week'},
  {id:'week6-deload',name:'4. Week 6 deload — Reduced volume',logs:requireFullWeek(6).map(l=>({...l,w:Math.round(l.w*0.65),r:l.r,rpe:6})),desc:'Deload week'},
  {id:'week8-stalled',name:'5. Week 8 stalled — Bench & Hack same weight 3 weeks',logs:buildStalledScenario(),desc:'Stall detection'},
  {id:'week10-fatigue',name:'6. Week 10 high fatigue — Lots of RPE 9–10',logs:requireFullWeek(10).map(l=>l.rpe?{...l,rpe:9.5}:l),desc:'Fatigue signals'},
  {id:'week12-sun-cross',name:'7. Week 12 — Sun 3rd quad day',logs:requireFullWeek(12),desc:'Cross-day, 3rd session'},
  {id:'week5-under',name:'8. Week 5 under volume — 50% program',logs:requireFullWeek(5).slice(0,40),desc:'Add volume recs'},
  {id:'no-rpe',name:'9. Week 5 no RPE — Raw sets only',logs:requireFullWeek(5).map(l=>{const x={...l};delete x.rpe;return x}),desc:'Hard-set fallback'},
  {id:'vol-no-strength',name:'10. Vol up, strength flat (4 weeks)',logs:buildVolNoStrength(),desc:'Learned: junk volume'},
];

function requireFullWeek(wk){
  const days=[{dk:'mon',exs:['Hack Squat','Single Leg Press','Leg Extension','Seated Leg Curl','Standing Calf Raise','Seated Calf Raise']},{dk:'tue',exs:['Barbell Bench Press','Incline Dumbbell Press','Cable Fly','Weighted Pull-Up','Plate Loaded Machine Row','Lat Pullover','Face Pull']},{dk:'wed',exs:['Barbell Curl','Incline Dumbbell Curl','Cable Hammer Curl','Close Grip Bench Press','Overhead Tricep Extension','Cable Pushdown','Lateral Raise Machine','Rear Delt Fly']},{dk:'thu',exs:['Belt Squat','Romanian Deadlift','Nordic Hamstring Curl','Leg Press','Leg Extension','Hip Abductor Machine','Standing Calf Raise','Seated Calf Raise']},{dk:'sat',exs:['Incline Barbell Press','Cable Fly','Hammer Curl','Cable Curl','Incline Dumbbell Curl','Spider Curl','Skull Crusher','Dumbbell Overhead Extension']},{dk:'sun',exs:['Leg Press','Hack Squat','Leg Extension','Stiff Leg Deadlift','Lying Leg Curl','Hip Abductor Machine','Standing Calf Raise']}];
  const dn={mon:'Monday',tue:'Tuesday',wed:'Wednesday',thu:'Thursday',sat:'Saturday',sun:'Sunday'};
  let logs=[];
  days.forEach((d,i)=>{
    const date='2025-02-'+(10+i);
    d.exs.forEach(ex=>{
      const sets=ex.includes('Calf')?3:4;
      for(let s=0;s<sets;s++)logs.push(mk({date,dk:d.dk,dn:dn[d.dk],wk,ex,sn:s+1,w:150+Math.random()*100,r:8,rpe:7.5}));
    });
  });
  return logs;
}
function buildStalledScenario(){
  const fix=(l)=>{const x={...l};if(x.ex==='Barbell Bench Press')x.w=275;if(x.ex==='Hack Squat')x.w=315;return x};
  const w6=requireFullWeek(6).map(fix);
  const w7=requireFullWeek(7).map(fix);
  const w8=requireFullWeek(8).map(fix);
  return [...w6,...w7,...w8];
}
function buildVolNoStrength(){
  let logs=[];
  for(let w=5;w<=8;w++){
    const week=requireFullWeek(w);
    if(w>=7)week.forEach(l=>{if(l.e1rm)l.e1rm=Math.round(l.e1rm*0.98)});
    logs=logs.concat(week);
  }
  return logs;
}

// ═══════════════════════════════════════════════════════════
// COPIED FROM app.html — Sync when Smart logic changes (see CODEBASE.md)
// ═══════════════════════════════════════════════════════════
const P={mon:{key:'mon',name:'Monday',focus:'Legs — Quad Focus',color:'#457b9d',exercises:[{id:'m1',name:'Hack Squat',sets:5},{id:'m2',name:'Single Leg Press',sets:3},{id:'m3',name:'Leg Extension',sets:3},{id:'m4',name:'Seated Leg Curl',sets:3},{id:'m5',name:'Standing Calf Raise',sets:4},{id:'m6',name:'Seated Calf Raise',sets:3}]},tue:{key:'tue',name:'Tuesday',focus:'Chest & Back',color:'#6a1b9a',exercises:[{id:'t1',name:'Barbell Bench Press',sets:4},{id:'t2',name:'Incline Dumbbell Press',sets:3},{id:'t3',name:'Cable Fly',sets:3},{id:'t4',name:'Weighted Pull-Up',sets:4},{id:'t5',name:'Plate Loaded Machine Row',sets:3},{id:'t6',name:'Lat Pullover',sets:3},{id:'t7',name:'Face Pull',sets:3}]},wed:{key:'wed',name:'Wednesday',focus:'Arms + Delts',color:'#00695c',exercises:[{id:'w1',name:'Barbell Curl',sets:4},{id:'w2',name:'Incline Dumbbell Curl',sets:3},{id:'w3',name:'Cable Hammer Curl',sets:3},{id:'w4',name:'Close Grip Bench Press',sets:4},{id:'w5',name:'Overhead Tricep Extension',sets:3},{id:'w6',name:'Cable Pushdown',sets:3},{id:'w7',name:'Lateral Raise Machine',sets:4},{id:'w8',name:'Rear Delt Fly',sets:3}]},thu:{key:'thu',name:'Thursday',focus:'Legs — Posterior',color:'#457b9d',exercises:[{id:'h1',name:'Belt Squat',sets:4},{id:'h2',name:'Romanian Deadlift',sets:4},{id:'h3',name:'Nordic Hamstring Curl',sets:3},{id:'h4',name:'Leg Press',sets:3},{id:'h5',name:'Leg Extension',sets:2},{id:'h6',name:'Hip Abductor Machine',sets:3},{id:'h7',name:'Standing Calf Raise',sets:4},{id:'h8',name:'Seated Calf Raise',sets:3}]},fri:{key:'fri',name:'Friday',rest:true,exercises:[]},sat:{key:'sat',name:'Saturday',focus:'Chest & Arms',color:'#6a1b9a',exercises:[{id:'s1',name:'Incline Barbell Press',sets:3},{id:'s2',name:'Cable Fly',sets:3},{id:'s3',name:'Hammer Curl',sets:4},{id:'s4',name:'Cable Curl',sets:3},{id:'s5',name:'Incline Dumbbell Curl',sets:3},{id:'s6',name:'Spider Curl',sets:3},{id:'s7',name:'Skull Crusher',sets:4},{id:'s8',name:'Dumbbell Overhead Extension',sets:3}]},sun:{key:'sun',name:'Sunday',focus:'Legs — Volume',color:'#457b9d',exercises:[{id:'u1',name:'Leg Press',sets:4},{id:'u2',name:'Hack Squat',sets:3},{id:'u3',name:'Leg Extension',sets:4},{id:'u4',name:'Stiff Leg Deadlift',sets:3},{id:'u5',name:'Lying Leg Curl',sets:4},{id:'u6',name:'Hip Abductor Machine',sets:3},{id:'u7',name:'Standing Calf Raise',sets:4}]}};
const DO=['mon','tue','wed','thu','fri','sat','sun'];
const DLOADS=new Set([3,6,9,12,15,18,21,24]);
const DELOAD_PCT={3:.65,6:.65,9:.65,12:.70,15:.65,18:.65,21:.65,24:.65};
const STIMULUS_TARGET={quads:10,hamstrings:8,calves:6,glutes:6,chest:8,back:10,biceps:8,triceps:8,delts:8};
const STIMULUS_CEILING={quads:18,hamstrings:16,calves:14,glutes:12,chest:16,back:18,biceps:14,triceps:14,delts:14};
const VOLUME_CEILINGS={quads:22,hamstrings:20,calves:18,glutes:14,chest:18,back:20,biceps:18,triceps:18,delts:18};
const WEEKLY_TARGETS={quads:{target:16,status:'lagging'},hamstrings:{target:14,status:'lagging'},calves:{target:12,status:'lagging'},glutes:{target:10},back:{target:14,status:'maintained'},biceps:{target:12,status:'maintained'},triceps:{target:12,status:'maintained'},chest:{target:12,status:'reduced'},delts:{target:12,status:'maintained'}};
const BODY_MAP=[{parts:['quads'],keys:['Squat','Leg Press','Leg Extension','Belt Squat','Pendulum','Bulgarian Split']},{parts:['hamstrings'],keys:['Deadlift','Leg Curl','Nordic','RDL','Stiff Leg']},{parts:['calves'],keys:['Calf Raise']},{parts:['glutes'],keys:['Hip Abductor','Hip Thrust']},{parts:['chest'],keys:['Bench','Press','Fly','Pec Deck','Incline']},{parts:['back'],keys:['Pull','Row','Pullover','Lat Pulldown']},{parts:['biceps'],keys:['Curl','Spider','Preacher']},{parts:['triceps'],keys:['Pushdown','Skull','Extension','Dip','Close Grip']},{parts:['delts'],keys:['Lateral Raise','Face Pull','Rear Delt']}];
const MUSCLE_MODEL=[{keys:['Bench','Press'],muscles:{chest:.6,triceps:.25,delts:.15},len:1},{keys:['Incline'],muscles:{chest:.55,triceps:.2,delts:.25},len:1.05},{keys:['Fly','Pec Deck'],muscles:{chest:.9},len:1.1},{keys:['Pull-Up','Pullup','Pull Up','Lat Pulldown'],muscles:{back:.6,biceps:.25,delts:.15},len:1.05},{keys:['Row','Pullover'],muscles:{back:.7,biceps:.2,delts:.1},len:1.05},{keys:['Face Pull','Rear Delt'],muscles:{delts:.85},len:1},{keys:['Hack Squat','Leg Press','Belt Squat','Pendulum Squat','Bulgarian Split'],muscles:{quads:.7,glutes:.25,hamstrings:.05},len:1},{keys:['Leg Extension'],muscles:{quads:.95},len:1.08},{keys:['Single Leg Press'],muscles:{quads:.65,glutes:.3},len:1.05},{keys:['RDL','Romanian Deadlift'],muscles:{hamstrings:.6,glutes:.3,back:.1},len:1.1},{keys:['Stiff Leg Deadlift','Nordic','Leg Curl'],muscles:{hamstrings:.9},len:1.05},{keys:['Curl'],muscles:{biceps:.8},len:1},{keys:['Close Grip','Skull','Pushdown','Extension','Overhead Extension','Dip'],muscles:{triceps:.9},len:1},{keys:['Lateral Raise'],muscles:{delts:.95},len:1.05},{keys:['Calf Raise'],muscles:{calves:1},len:1},{keys:['Hip Abductor','Hip Thrust'],muscles:{glutes:.9},len:1}];
const DAY_NAMES={mon:'Monday',tue:'Tuesday',wed:'Wednesday',thu:'Thursday',fri:'Friday',sat:'Saturday',sun:'Sunday'};
let EL=[{n:'Hack Squat',m:'Quads'},{n:'Leg Press',m:'Quads'},{n:'Leg Extension',m:'Quads'},{n:'Belt Squat',m:'Quads'},{n:'Romanian Deadlift',m:'Hamstrings'},{n:'Seated Leg Curl',m:'Hamstrings'},{n:'Barbell Bench Press',m:'Chest'},{n:'Incline Dumbbell Press',m:'Chest'},{n:'Cable Fly',m:'Chest'},{n:'Weighted Pull-Up',m:'Back'},{n:'Lat Pulldown',m:'Back'},{n:'Barbell Curl',m:'Biceps'},{n:'Skull Crusher',m:'Triceps'},{n:'Lateral Raise Machine',m:'Delts'}];

function getBlockPhase(wk){
  if(wk>=24)return{block:0,name:'Macrocycle Complete',phase:'★ ACTIVE RECOVERY ★'};
  if(wk<=9)return{block:1,name:'Block 1',phase:wk<=2?'Break-In':DLOADS.has(wk)?'★ DELOAD ★':wk<=5?'Full Volume':'Assessment'};
  if(wk<=15)return{block:2,name:'Block 2',phase:DLOADS.has(wk)?'★ DELOAD ★':'Peak'};
  return{block:3,name:'Block 3',phase:DLOADS.has(wk)?'★ DELOAD ★':'Volume Push'};
}
function getBodyPart(exName){
  const n=(exName||'').toLowerCase();
  for(const {parts,keys} of BODY_MAP){if(keys.some(k=>n.includes(k.toLowerCase())))return parts[0]}
  return 'other';
}
function getMuscleWeights(exName){
  const n=(exName||'').toLowerCase();
  for(const {keys,muscles} of MUSCLE_MODEL){if(keys.some(k=>n.includes(k.toLowerCase())))return muscles}
  const bp=getBodyPart(exName);
  return bp&&bp!=='other'?{[bp]:1}:{};
}
function getLengthBias(exName){
  const n=(exName||'').toLowerCase();
  for(const {keys,len} of MUSCLE_MODEL){if(keys.some(k=>n.includes(k.toLowerCase())))return len||1}
  return 1;
}
function calcE1RM(w,r){return w&&r?Math.round(w*(1+r/30)):null}
function getBestE1RMForExercise(exName,weeksBack,optWk){
  const refWk=optWk!=null?optWk:(ST.wk||1);
  const cutoff=Math.max(1,refWk-weeksBack);
  const logs=ST.logs.filter(l=>l.ex===exName&&l.e1rm&&l.wk>=cutoff).sort((a,b)=>b.e1rm-a.e1rm);
  return logs[0]?.e1rm||null;
}
function estimateRIR(l,bestE1RM){
  if(l.rpe!=null&&!isNaN(parseFloat(l.rpe)))return Math.max(0,Math.min(10,Math.round(10-parseFloat(l.rpe))));
  const w=parseFloat(l.w),r=parseInt(l.r,10);
  if(!w||!r)return null;
  const e1rm=bestE1RM||l.e1rm||calcE1RM(w,r);
  if(!e1rm||e1rm<w)return 0;
  const predReps=30*(e1rm/w-1);
  return Math.max(0,Math.round(predReps-r));
}
function proximityFromEstimatedRIR(rir){
  if(rir==null)return 0.5;
  if(rir<=1)return 1.1;if(rir<=3)return 1.0;if(rir<=5)return 0.8;
  return 0.5;
}
function getEffectiveReps(rir){return rir==null?0:Math.max(0,Math.min(5,5-rir));}
function isHardSet(l){
  const rpe=l.rpe!=null?parseFloat(l.rpe):null;
  const r=l.r!=null?parseInt(l.r,10):0;
  if(rpe!=null&&!isNaN(rpe)&&rpe>=7)return true;
  if(r>=12&&rpe!=null&&!isNaN(rpe)&&rpe>=8)return true;
  const ex=(l.ex||'').toLowerCase();
  if(ex.includes('drop')||ex.includes('myo-reps'))return true;
  return false;
}
const COMPOUND_KEYS=['squat','bench','deadlift','press','row','pull-up','pullup','rdl','dip','barbell'];
const MACHINE_COMPOUND_KEYS=['leg press','leg extension','hack squat','belt squat','pendulum','pec deck','lat pulldown','machine row','leg curl','hip abductor','seated leg','lying leg','calf raise','cable fly','cable curl','cable pushdown'];
function isCompound(exName){const n=(exName||'').toLowerCase();return COMPOUND_KEYS.some(k=>n.includes(k))}
function isMachineCompound(exName){const n=(exName||'').toLowerCase();return MACHINE_COMPOUND_KEYS.some(k=>n.includes(k))}
function getFatigueMultiplier(exName){
  if(isCompound(exName)&&!isMachineCompound(exName))return 1.3;
  if(isCompound(exName)||isMachineCompound(exName))return 1.0;
  return 0.7;
}
function getSetStimulusUnits(l,bestE1RM){
  const mw=getMuscleWeights(l.ex);
  const lb=getLengthBias(l.ex);
  const rir=estimateRIR(l,bestE1RM);

      const mod=et.modulation;
      const modTag=mod?`<span class="smart-mod ${(mod.action||'').toLowerCase().replace(/_/g,'-')}">${mod.action}: ${mod.suggestion}</span>`:'';
      const swaps=et.swapOptions?.length?`<div class="smart-swaps">Swap to: ${et.swapOptions.slice(0,3).join(', ')}</div>`:'';
      const tipsHtml=et.tips?.length?et.tips.map(t=>`<div class="smart-ex-tip ${t.type}">${t.msg}</div>`).join(''):'';
      const pvr=et.programVsRec;
      const pvrHtml=pvr?`<div class="smart-pvr"><span class="smart-pvr-program">Program: ${pvr.program} sets</span> → <span class="smart-pvr-rec">${pvr.recommended} sets</span> <span class="smart-pvr-why">(${pvr.reason})</span></div>`:'';
      h+=`<div class="smart-ex-row"><div class="smart-ex-name">${i+1}. ${et.displayName}</div>${modTag}${pvrHtml}${tipsHtml}${swaps}</div>`;
    });
    h+=`</div></div>`;
  });
  h+=`</div><div class="smart-card cite"><div class="smart-hdr">Science Sources</div><ul class="smart-cites">${citations.map(c=>`<li>${c}</li>`).join('')}</ul><div class="smart-princ">Mechanical tension + metabolic stress. Hard sets = RIR 1–3. 8–20 sets/muscle/week.</div></div>`;
  el.innerHTML=h;
}

// ═══════════════════════════════════════════════════════════
// TEST HARNESS — Uses mock ST, never localStorage
// ═══════════════════════════════════════════════════════════
let ST={wk:1,smartWk:1,logs:[],restDays:['fri'],weekSchedules:{},addedExercises:{}};

const SCENARIO_DEFAULT_WK={empty:1,'week1-partial':1,'week5-full':5,'week6-deload':6,'week8-stalled':8,'week10-fatigue':10,'week12-sun-cross':12,'week5-under':5,'no-rpe':5,'vol-no-strength':8};
function applyScenario(scenarioChanged){
  const scenId=document.getElementById('SCEN_SEL').value;
  let wk=parseInt(document.getElementById('WK_SEL').value,10);
  const scen=SCENARIOS.find(s=>s.id===scenId);
  ST.logs=scen?[...scen.logs]:[];
  if(scenarioChanged){const suggest=SCENARIO_DEFAULT_WK[scenId];if(suggest){document.getElementById('WK_SEL').value=String(suggest);wk=suggest;}}
  ST.wk=wk;
  ST.smartWk=wk;
  renderSmartProgram();
}
function formatOneScenario(scen,wk,out){
  let s='';
  s+=`\n${'═'.repeat(70)}\n`;
  s+=`ATHLETE: ${scen.name}\n`;
  s+=`WEEK: ${wk} | ${scen.desc}\n`;
  s+=`${'═'.repeat(70)}\n`;
  if(out.core&&out.weeksLogged>0){
    const c=out.core,e1=c.e1rmTrend;const mus=['quads','hamstrings','chest','back','delts'];
    s+=`\n4 CORE METRICS:\n`;
    s+=`  e1RM trend: ${e1?.trend||'—'} ${e1?.pctChange!=null?`(${e1.pctChange>0?'+':''}${e1.pctChange.toFixed(1)}%)`:''}\n`;
    s+=`  Systemic fatigue: ${c.systemicFatigue!=null?c.systemicFatigue.toFixed(0):'—'}\n`;
    mus.forEach(m=>{const st=c.stimulus[m]||0,ef=c.effectiveReps[m]||0,r=c.ratio[m];s+=`  ${m}: stimulus ${st.toFixed(1)} effReps ${ef.toFixed(0)} S:F ${r!=null?r.toFixed(2):'—'}\n`;});
  }
  s+=`\nWEEK VERDICT:\n${out.weekVerdict||'(none)'}\n`;
  s+=`\nWEEK OVERVIEW:\n`;
  (out.dayPlan||[]).forEach(d=>{s+=`  ${d.name}: ${d.type==='rest'?'Rest':`${d.focus||''} (${d.exCount} exercises)`}\n`;});
  s+=`\nWEEK-LEVEL RECOMMENDATIONS:\n`;
  if(!out.recs||!out.recs.length)s+=`  On track.\n`;
  else out.recs.forEach(r=>{
    if(r.type==='junk_volume')s+=`  ⚠ JUNK VOLUME: ${r.reason}\n`;
    else if(r.type==='systemic_reduce')s+=`  ⚠ SYSTEMIC REDUCE: ${r.reason}\n`;
    else if(r.type==='proximity_priority')s+=`  ${r.muscle} (proximity): ${r.reason}\n`;
    else if(r.type==='reduce_volume')s+=`  ⚠ REDUCE: ${r.reason}\n`;
    else if(r.type==='over_ceiling')s+=`  ${r.muscle} over ceiling (${r.current}>${r.ceiling}): ${r.reason}\n`;
    else if(r.type==='add_volume')s+=`  + ${r.muscle}: ${r.reason} (stimulus ${r.current}→${r.target})\n`;
    else if(r.type==='hold_volume')s+=`  HOLD ${r.muscle}: ${r.reason}\n`;
    else if(r.type==='stall')s+=`  STALL ${r.ex} @ ${r.weight} since ${r.since}: ${r.action}\n`;
    else if(r.type==='info')s+=`  INFO: ${r['Schoenfeld 2017']||r.reason}\n`;
    else if(r.type==='learned')s+=`  📈 ${r.title}: ${r.msg}\n`;
    else s+=`  ${r.title}: ${r.reason||''}\n`;
  });
  s+=`\nPER-DAY & PER-EXERCISE TIPS:\n`;
  (out.dayDetails||[]).forEach(dd=>{
    if(dd.type==='rest')return;
    s+=`\n  --- ${dd.name} (${dd.focus}) ---\n`;
    (dd.exTips||[]).forEach((et,i)=>{
      s+=`    ${i+1}. ${et.displayName} (${et.sets} sets)\n`;
      if(et.modulation)s+=`       Modulation: ${et.modulation.action} — ${et.modulation.suggestion}\n`;
      if(et.programVsRec)s+=`       Program ${et.programVsRec.program} sets → Recommended ${et.programVsRec.recommended} (${et.programVsRec.reason})\n`;
      (et.tips||[]).forEach(t=>s+=`       • ${t.msg}\n`);
      if(et.swapOptions?.length)s+=`       Swap to: ${et.swapOptions.slice(0,3).join(', ')}\n`;
    });
  });
  return s;
}
function runAllAthletes(){
  const panel=document.getElementById('OUTPUT_PANEL');
  const ta=document.getElementById('OUTPUT_TA');
  let full='';
  full+=`SMART TAB ENGINE — FULL ATHLETE TEST OUTPUT\n`;
  full+=`Generated: ${new Date().toISOString()}\n`;
  full+=`Engine: Performance-driven stimulus (e1RM, effective reps, proximity). Fatigue = volume load × intensity.\n`;
  full+=`\n${'═'.repeat(70)}\n`;
  SCENARIOS.forEach((scen,i)=>{
    const wk=SCENARIO_DEFAULT_WK[scen.id]||Math.min(5,i+1);
    ST.logs=scen.logs?[...scen.logs]:[];
    ST.wk=wk;
    ST.smartWk=wk;
    const out=computeSmartRecommendations(wk);
    full+=formatOneScenario(scen,wk,out);
  });
  full+=`\n${'═'.repeat(70)}\n`;
  full+=`\nEND OF OUTPUT — ${SCENARIOS.length} athletes tested\n`;
  ta.value=full;
  panel.style.display='block';
  ta.select();
}
function copyOutput(){
  const ta=document.getElementById('OUTPUT_TA');
  const btn=document.querySelector('#OUTPUT_PANEL button');
  const done=()=>{if(btn){const o=btn.textContent;btn.textContent='Copied!';setTimeout(()=>btn.textContent=o,1500);}};
  if(navigator.clipboard?.writeText){navigator.clipboard.writeText(ta.value).then(done).catch(()=>{ta.select();document.execCommand('copy');done();});}
  else{ta.select();document.execCommand('copy');done();}
}
function init(){
  const ssel=document.getElementById('SCEN_SEL');
  if(ssel)ssel.innerHTML=SCENARIOS.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
  const wsel=document.getElementById('WK_SEL');
  if(wsel)wsel.innerHTML=Array.from({length:24},(_,i)=>`<option value="${i+1}">W${i+1}${DLOADS.has(i+1)?' (Deload)':''}</option>`).join('');
  applyScenario(true);
}

// Validation API — for validation-test.html to run scenarios programmatically
window.ENGINE_READY=true;
window.runValidationScenario=function(logs,wk){
  ST.logs=Array.isArray(logs)?[...logs]:[];
  ST.wk=wk;ST.smartWk=wk;
  return computeSmartRecommendations(wk);
};
window.getEngineMetrics=function(wk){
  ST.wk=wk;ST.smartWk=wk;
  return{core:getCoreMetrics(wk),global:getGlobalState(wk),fatigueScore:detectOverreaching().fatigueScore};
};

init();
