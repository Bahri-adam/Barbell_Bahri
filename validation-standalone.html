<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engine Validation Suite — Standalone</title>
<style>
:root{--bg:#0a0e14;--s1:#151b23;--b1:#2a3544;--red:#e63946;--grn:#2a9d8f;--gold:#f4a261;--tx:#e8ecf1;--tx2:#a8b3c4}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:system-ui;padding:16px}
h1{font-size:18px;margin-bottom:12px;color:var(--grn)}
.banner{background:linear-gradient(90deg,#1a2332,#0d1219);border:1px solid var(--b1);border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:13px}
.controls{margin-bottom:16px;display:flex;gap:12px;align-items:center}
.controls button{background:var(--grn);color:#111;border:none;padding:10px 20px;border-radius:6px;font-weight:700;cursor:pointer}
.controls button.gold{background:var(--gold)}
#REPORT{width:100%;min-height:300px;background:#111;color:#ddd;font-family:monospace;font-size:11px;padding:12px;border:1px solid var(--b1);border-radius:6px;line-height:1.6;white-space:pre-wrap}
.pass{color:var(--grn)}.fail{color:var(--red)}
table{border-collapse:collapse;width:100%;margin:8px 0;font-size:11px}
th,td{border:1px solid var(--b1);padding:6px 8px;text-align:left}

</style>
</head>
<body style="min-height:100vh">
<h1>Engine Validation Suite — Standalone</h1>
<div class="banner" style="border-color:var(--gold)">
  <strong>Validation Suite (Standalone)</strong> — No iframe. Engine embedded. Runs on file:// or local server.<br>
  Validation and stability tests auto-run on load.
</div>
<div class="controls">
  <button onclick="runValidation()">▶ Run Full Validation</button>
  <button class="gold" onclick="runStabilityTests()">▶ Run Stability (Noise) Tests</button>
  <button onclick="copyReport()" style="background:var(--b1);color:var(--tx)">Copy Report</button>
  <button onclick="downloadReport()" style="background:var(--b1);color:var(--tx)">Download VALIDATION-OUTPUT.md</button>
</div>
<div id="REPORT">Loading…</div>

<script>
window.onerror=function(m,f,l){var r=document.getElementById('REPORT');if(r)r.textContent='Error: '+m+' (line '+l+'). Check console (F12).';};

// ═══════════════════════════════════════════════════════════
// ENGINE — ST, constants, and all computeSmartRecommendations dependencies
// ═══════════════════════════════════════════════════════════
let ST={wk:1,smartWk:1,logs:[],restDays:['fri'],weekSchedules:{},addedExercises:{}};
const P={mon:{key:'mon',name:'Monday',focus:'Legs — Quad Focus',color:'#457b9d',exercises:[{id:'m1',name:'Hack Squat',sets:5},{id:'m2',name:'Single Leg Press',sets:3},{id:'m3',name:'Leg Extension',sets:3},{id:'m4',name:'Seated Leg Curl',sets:3},{id:'m5',name:'Standing Calf Raise',sets:4},{id:'m6',name:'Seated Calf Raise',sets:3}]},tue:{key:'tue',name:'Tuesday',focus:'Chest & Back',color:'#6a1b9a',exercises:[{id:'t1',name:'Barbell Bench Press',sets:4},{id:'t2',name:'Incline Dumbbell Press',sets:3},{id:'t3',name:'Cable Fly',sets:3},{id:'t4',name:'Weighted Pull-Up',sets:4},{id:'t5',name:'Plate Loaded Machine Row',sets:3},{id:'t6',name:'Lat Pullover',sets:3},{id:'t7',name:'Face Pull',sets:3}]},wed:{key:'wed',name:'Wednesday',focus:'Arms + Delts',color:'#00695c',exercises:[{id:'w1',name:'Barbell Curl',sets:4},{id:'w2',name:'Incline Dumbbell Curl',sets:3},{id:'w3',name:'Cable Hammer Curl',sets:3},{id:'w4',name:'Close Grip Bench Press',sets:4},{id:'w5',name:'Overhead Tricep Extension',sets:3},{id:'w6',name:'Cable Pushdown',sets:3},{id:'w7',name:'Lateral Raise Machine',sets:4},{id:'w8',name:'Rear Delt Fly',sets:3}]},thu:{key:'thu',name:'Thursday',focus:'Legs — Posterior',color:'#457b9d',exercises:[{id:'h1',name:'Belt Squat',sets:4},{id:'h2',name:'Romanian Deadlift',sets:4},{id:'h3',name:'Nordic Hamstring Curl',sets:3},{id:'h4',name:'Leg Press',sets:3},{id:'h5',name:'Leg Extension',sets:2},{id:'h6',name:'Hip Abductor Machine',sets:3},{id:'h7',name:'Standing Calf Raise',sets:4},{id:'h8',name:'Seated Calf Raise',sets:3}]},fri:{key:'fri',name:'Friday',rest:true,exercises:[]},sat:{key:'sat',name:'Saturday',focus:'Chest & Arms',color:'#6a1b9a',exercises:[{id:'s1',name:'Incline Barbell Press',sets:3},{id:'s2',name:'Cable Fly',sets:3},{id:'s3',name:'Hammer Curl',sets:4},{id:'s4',name:'Cable Curl',sets:3},{id:'s5',name:'Incline Dumbbell Curl',sets:3},{id:'s6',name:'Spider Curl',sets:3},{id:'s7',name:'Skull Crusher',sets:4},{id:'s8',name:'Dumbbell Overhead Extension',sets:3}]},sun:{key:'sun',name:'Sunday',focus:'Legs — Volume',color:'#457b9d',exercises:[{id:'u1',name:'Leg Press',sets:4},{id:'u2',name:'Hack Squat',sets:3},{id:'u3',name:'Leg Extension',sets:4},{id:'u4',name:'Stiff Leg Deadlift',sets:3},{id:'u5',name:'Lying Leg Curl',sets:4},{id:'u6',name:'Hip Abductor Machine',sets:3},{id:'u7',name:'Standing Calf Raise',sets:4}]}};
const DO=['mon','tue','wed','thu','fri','sat','sun'];
const DLOADS=new Set([3,6,9,12,15,18,21,24]);
const DELOAD_PCT={3:.65,6:.65,9:.65,12:.70,15:.65,18:.65,21:.65,24:.65};
const STIMULUS_TARGET={quads:10,hamstrings:8,calves:6,glutes:6,chest:8,back:10,biceps:8,triceps:8,delts:8};
const STIMULUS_CEILING={quads:18,hamstrings:16,calves:14,glutes:12,chest:16,back:18,biceps:14,triceps:14,delts:14};
const VOLUME_CEILINGS={quads:22,hamstrings:20,calves:18,glutes:14,chest:18,back:20,biceps:18,triceps:18,delts:18};
const WEEKLY_TARGETS={quads:{target:16,status:'lagging'},hamstrings:{target:14,status:'lagging'},calves:{target:12,status:'lagging'},glutes:{target:10},back:{target:14,status:'maintained'},biceps:{target:12,status:'maintained'},triceps:{target:12,status:'maintained'},chest:{target:12,status:'reduced'},delts:{target:12,status:'maintained'}};
const BODY_MAP=[{parts:['quads'],keys:['Squat','Leg Press','Leg Extension','Belt Squat','Pendulum','Bulgarian Split']},{parts:['hamstrings'],keys:['Deadlift','Leg Curl','Nordic','RDL','Stiff Leg']},{parts:['calves'],keys:['Calf Raise']},{parts:['glutes'],keys:['Hip Abductor','Hip Thrust']},{parts:['chest'],keys:['Bench','Press','Fly','Pec Deck','Incline']},{parts:['back'],keys:['Pull','Row','Pullover','Lat Pulldown']},{parts:['biceps'],keys:['Curl','Spider','Preacher']},{parts:['triceps'],keys:['Pushdown','Skull','Extension','Dip','Close Grip']},{parts:['delts'],keys:['Lateral Raise','Face Pull','Rear Delt']}];
const MUSCLE_MODEL=[{keys:['Bench','Press'],muscles:{chest:.6,triceps:.25,delts:.15},len:1},{keys:['Incline'],muscles:{chest:.55,triceps:.2,delts:.25},len:1.05},{keys:['Fly','Pec Deck'],muscles:{chest:.9},len:1.1},{keys:['Pull-Up','Pullup','Pull Up','Lat Pulldown'],muscles:{back:.6,biceps:.25,delts:.15},len:1.05},{keys:['Row','Pullover'],muscles:{back:.7,biceps:.2,delts:.1},len:1.05},{keys:['Face Pull','Rear Delt'],muscles:{delts:.85},len:1},{keys:['Hack Squat','Leg Press','Belt Squat','Pendulum Squat','Bulgarian Split'],muscles:{quads:.7,glutes:.25,hamstrings:.05},len:1},{keys:['Leg Extension'],muscles:{quads:.95},len:1.08},{keys:['Single Leg Press'],muscles:{quads:.65,glutes:.3},len:1.05},{keys:['RDL','Romanian Deadlift'],muscles:{hamstrings:.6,glutes:.3,back:.1},len:1.1},{keys:['Stiff Leg Deadlift','Nordic','Leg Curl'],muscles:{hamstrings:.9},len:1.05},{keys:['Curl'],muscles:{biceps:.8},len:1},{keys:['Close Grip','Skull','Pushdown','Extension','Overhead Extension','Dip'],muscles:{triceps:.9},len:1},{keys:['Lateral Raise'],muscles:{delts:.95},len:1.05},{keys:['Calf Raise'],muscles:{calves:1},len:1},{keys:['Hip Abductor','Hip Thrust'],muscles:{glutes:.9},len:1}];
const DAY_NAMES={mon:'Monday',tue:'Tuesday',wed:'Wednesday',thu:'Thursday',fri:'Friday',sat:'Saturday',sun:'Sunday'};
let EL=[{n:'Hack Squat',m:'Quads'},{n:'Leg Press',m:'Quads'},{n:'Leg Extension',m:'Quads'},{n:'Belt Squat',m:'Quads'},{n:'Romanian Deadlift',m:'Hamstrings'},{n:'Seated Leg Curl',m:'Hamstrings'},{n:'Barbell Bench Press',m:'Chest'},{n:'Incline Dumbbell Press',m:'Chest'},{n:'Cable Fly',m:'Chest'},{n:'Weighted Pull-Up',m:'Back'},{n:'Lat Pulldown',m:'Back'},{n:'Barbell Curl',m:'Biceps'},{n:'Skull Crusher',m:'Triceps'},{n:'Lateral Raise Machine',m:'Delts'}];

function getBlockPhase(wk){
  if(wk>=24)return{block:0,name:'Macrocycle Complete',phase:'★ ACTIVE RECOVERY ★'};
  if(wk<=9)return{block:1,name:'Block 1',phase:wk<=2?'Break-In':DLOADS.has(wk)?'★ DELOAD ★':wk<=5?'Full Volume':'Assessment'};
  if(wk<=15)return{block:2,name:'Block 2',phase:DLOADS.has(wk)?'★ DELOAD ★':'Peak'};
  return{block:3,name:'Block 3',phase:DLOADS.has(wk)?'★ DELOAD ★':'Volume Push'};
}
function getBodyPart(exName){
  const n=(exName||'').toLowerCase();
  for(const {parts,keys} of BODY_MAP){if(keys.some(k=>n.includes(k.toLowerCase())))return parts[0]}
  return 'other';
}
function getMuscleWeights(exName){
  const n=(exName||'').toLowerCase();
  for(const {keys,muscles} of MUSCLE_MODEL){if(keys.some(k=>n.includes(k.toLowerCase())))return muscles}
  const bp=getBodyPart(exName);
  return bp&&bp!=='other'?{[bp]:1}:{};
}
function getLengthBias(exName){
  const n=(exName||'').toLowerCase();
  for(const {keys,len} of MUSCLE_MODEL){if(keys.some(k=>n.includes(k.toLowerCase())))return len||1}
  return 1;
}
function calcE1RM(w,r){return w&&r?Math.round(w*(1+r/30)):null}
function getBestE1RMForExercise(exName,weeksBack,optWk){
  const refWk=optWk!=null?optWk:(ST.wk||1);
  const cutoff=Math.max(1,refWk-weeksBack);
  const logs=ST.logs.filter(l=>l.ex===exName&&l.e1rm&&l.wk>=cutoff).sort((a,b)=>b.e1rm-a.e1rm);
  return logs[0]?.e1rm||null;
}
function estimateRIR(l,bestE1RM){
  if(l.rpe!=null&&!isNaN(parseFloat(l.rpe)))return Math.max(0,Math.min(10,Math.round(10-parseFloat(l.rpe))));
  const w=parseFloat(l.w),r=parseInt(l.r,10);
  if(!w||!r)return null;
  const e1rm=bestE1RM||l.e1rm||calcE1RM(w,r);
  if(!e1rm||e1rm<w)return 0;
  const predReps=30*(e1rm/w-1);
  return Math.max(0,Math.round(predReps-r));
}
function proximityFromEstimatedRIR(rir){
  if(rir==null)return 0.5;
  if(rir<=1)return 1.1;if(rir<=3)return 1.0;if(rir<=5)return 0.8;
  return 0.5;
}
function getEffectiveReps(rir){return rir==null?0:Math.max(0,Math.min(5,5-rir));}
function isHardSet(l){
  const rpe=l.rpe!=null?parseFloat(l.rpe):null;
  const r=l.r!=null?parseInt(l.r,10):0;
  if(rpe!=null&&!isNaN(rpe)&&rpe>=7)return true;
  if(r>=12&&rpe!=null&&!isNaN(rpe)&&rpe>=8)return true;
  const ex=(l.ex||'').toLowerCase();
  if(ex.includes('drop')||ex.includes('myo-reps'))return true;
  return false;
}
const COMPOUND_KEYS=['squat','bench','deadlift','press','row','pull-up','pullup','rdl','dip','barbell'];
const MACHINE_COMPOUND_KEYS=['leg press','leg extension','hack squat','belt squat','pendulum','pec deck','lat pulldown','machine row','leg curl','hip abductor','seated leg','lying leg','calf raise','cable fly','cable curl','cable pushdown'];
function isCompound(exName){const n=(exName||'').toLowerCase();return COMPOUND_KEYS.some(k=>n.includes(k))}
function isMachineCompound(exName){const n=(exName||'').toLowerCase();return MACHINE_COMPOUND_KEYS.some(k=>n.includes(k))}
function getFatigueMultiplier(exName){
  if(isCompound(exName)&&!isMachineCompound(exName))return 1.3;
  if(isCompound(exName)||isMachineCompound(exName))return 1.0;
  return 0.7;
}
function getSetStimulusUnits(l,bestE1RM){
  const mw=getMuscleWeights(l.ex);
  const lb=getLengthBias(l.ex);
  const rir=estimateRIR(l,bestE1RM);
  const effReps=getEffectiveReps(rir);
  const prox=proximityFromEstimatedRIR(rir);
  const w=parseFloat(l.w),e1rm=bestE1RM||l.e1rm||calcE1RM(w,parseInt(l.r,10)||8);
  const intensityRatio=e1rm?w/e1rm:0.8;
  const tensionFactor=intensityRatio>=0.92?1.1:intensityRatio>=0.85?1.0:intensityRatio>=0.75?0.9:0.7;
  const units=(effReps/5)*prox*tensionFactor;
  const out={quads:0,hamstrings:0,calves:0,glutes:0,chest:0,back:0,biceps:0,triceps:0,delts:0};
  Object.keys(mw).forEach(m=>{if(out[m]!=null)out[m]=(mw[m]||0)*lb*units;});
  return out;
}
function getSetFatigueCost(l,bestE1RM){
  const w=parseFloat(l.w)||0,r=parseInt(l.r,10)||0;
  const e1rm=bestE1RM||l.e1rm||calcE1RM(w,r);
  const mult=getFatigueMultiplier(l.ex);
  return w*r*mult*(e1rm?w/e1rm:0.8);
}
function getWeeklyStimulus(wk){
  const out={quads:0,hamstrings:0,calves:0,glutes:0,chest:0,back:0,biceps:0,triceps:0,delts:0};
  ST.logs.filter(l=>l.wk===wk).forEach(l=>{
    const bestE1RM=getBestE1RMForExercise(l.ex,4,wk);
    const su=getSetStimulusUnits(l,bestE1RM);
    Object.keys(su).forEach(m=>{if(out[m]!=null)out[m]+=su[m];});
  });
  return out;
}
function getLocalFatiguePerMuscle(wk){
  const out={quads:0,hamstrings:0,calves:0,glutes:0,chest:0,back:0,biceps:0,triceps:0,delts:0};
  ST.logs.filter(l=>l.wk===wk).forEach(l=>{
    const bestE1RM=getBestE1RMForExercise(l.ex,4,wk);
    const cost=getSetFatigueCost(l,bestE1RM);
    const mw=getMuscleWeights(l.ex);
    Object.keys(mw).forEach(m=>{if(out[m]!=null)out[m]+=cost*(mw[m]||0);});
  });
  return out;
}
function getEffectiveRepsPerMuscle(wk){
  const out={quads:0,hamstrings:0,calves:0,glutes:0,chest:0,back:0,biceps:0,triceps:0,delts:0};
  ST.logs.filter(l=>l.wk===wk).forEach(l=>{
    const bestE1RM=getBestE1RMForExercise(l.ex,4,wk);
    const effReps=getEffectiveReps(estimateRIR(l,bestE1RM));
    const mw=getMuscleWeights(l.ex);
    Object.keys(mw).forEach(m=>{if(out[m]!=null)out[m]+=effReps*(mw[m]||0);});
  });
  return out;
}
function getE1RMTrend(wk){
  const compounds=ST.logs.filter(l=>isCompound(l.ex)&&l.e1rm);
  if(compounds.length<4)return{slope:0,pctChange:0,trend:'unknown'};
  const byEx={};
  compounds.forEach(l=>{if(!byEx[l.ex])byEx[l.ex]={};const w=l.wk;if(!byEx[l.ex][w]||l.e1rm>byEx[l.ex][w])byEx[l.ex][w]=l.e1rm;});
  const wks=[...new Set(compounds.map(l=>l.wk))].filter(w=>w>=Math.max(1,wk-4)&&w<=wk).sort((a,b)=>a-b);
  if(wks.length<2)return{slope:0,pctChange:0,trend:'unknown'};
  const avgByWk={};
  wks.forEach(w=>{const vals=Object.values(byEx).map(ex=>ex[w]).filter(Boolean);avgByWk[w]=vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0;});
  const validWks=wks.filter(w=>avgByWk[w]>50);
  if(validWks.length<2)return{slope:0,pctChange:0,trend:'unknown'};
  const first=avgByWk[validWks[0]],last=avgByWk[validWks[validWks.length-1]];
  let pctChange=first>50?((last-first)/first)*100:0;
  pctChange=Math.max(-30,Math.min(30,pctChange));
  return{slope:(last-first)/Math.max(1,validWks.length-1),pctChange,trend:pctChange>1?'up':pctChange<-2?'down':'flat'};
}
function getStimulusToFatigueRatio(wk){
  const stimulus=getWeeklyStimulus(wk);
  const localFatigue=getLocalFatiguePerMuscle(wk);
  const out={};
  ['quads','hamstrings','calves','glutes','chest','back','biceps','triceps','delts'].forEach(m=>{
    out[m]=(stimulus[m]||0)/Math.max(1,localFatigue[m]||1);
  });
  return out;
}
function getCoreMetrics(wk){
  return{
    stimulus:getWeeklyStimulus(wk),
    effectiveReps:getEffectiveRepsPerMuscle(wk),
    localFatigue:getLocalFatiguePerMuscle(wk),
    systemicFatigue:getNormalizedFatigueScore(wk),
    e1rmTrend:getE1RMTrend(wk),
    ratio:getStimulusToFatigueRatio(wk)
  };
}
function getWeeklyFatigue(wk){
  let total=0;
  ST.logs.filter(l=>l.wk===wk).forEach(l=>{
    const bestE1RM=getBestE1RMForExercise(l.ex,4,wk);
    total+=getSetFatigueCost(l,bestE1RM);
  });
  return total;
}
function getNormalizedFatigueScore(wk){
  const logs=ST.logs.filter(l=>l.wk===wk);
  if(!logs.length)return 0;
  const volByWk={};
  for(let w=Math.max(1,wk-4);w<=wk;w++)volByWk[w]=ST.logs.filter(l=>l.wk===w).reduce((s,l)=>s+((l.w||0)*(l.r||0)),0);
  const wks=Object.keys(volByWk).map(Number).sort((a,b)=>a-b).filter(w=>volByWk[w]>0);
  const thisVol=volByWk[wk]||0;
  const mean=wks.length?wks.reduce((s,w)=>s+volByWk[w],0)/wks.length:thisVol;
  const variance=wks.length>1?wks.reduce((s,w)=>s+Math.pow(volByWk[w]-mean,2),0)/(wks.length-1):0;
  const std=Math.sqrt(variance)||1;
  const volZ=std>0?(thisVol-mean)/std:0;
  const volume_load_z=Math.max(0,Math.min(1,(Math.max(-2,Math.min(2,volZ))+2)/4));
  let intensitySum=0,intensityCnt=0;
  const topByEx={};
  logs.forEach(l=>{
    const e1rm=l.e1rm||getBestE1RMForExercise(l.ex,4,wk)||calcE1RM(parseFloat(l.w),parseInt(l.r,10)||8);
    if(!e1rm||!l.w)return;
    const pct=(l.w/e1rm)*100;
    if(!topByEx[l.ex]||l.w>topByEx[l.ex].w){topByEx[l.ex]={w:l.w,pct};}
  });
  Object.values(topByEx).forEach(t=>{intensitySum+=t.pct;intensityCnt++;});
  const meanIntensityPct=intensityCnt?intensitySum/intensityCnt:75;
  const mean_intensity=Math.max(0,Math.min(1,(meanIntensityPct-60)/30));
  let rirAtOrBelow1=0,rir0=0,totalWithRir=0;
  logs.forEach(l=>{
    const bestE1RM=getBestE1RMForExercise(l.ex,4,wk);
    const rir=estimateRIR(l,bestE1RM);
    if(rir!=null){totalWithRir++;if(rir<=1)rirAtOrBelow1++;if(rir<=0)rir0++;}
  });
  const proximity=totalWithRir?Math.max(0,Math.min(1,(rirAtOrBelow1/totalWithRir)/0.4)):0;
  const failure_rate=totalWithRir?Math.max(0,Math.min(1,(rir0/totalWithRir)/0.1)):0;
  const fatigue=100*(0.35*volume_load_z+0.25*mean_intensity+0.2*proximity+0.15*failure_rate);
  return Math.round(Math.max(0,Math.min(100,fatigue)));
}
function getTotalEffectiveSets(wk){
  let total=0;
  ST.logs.filter(l=>l.wk===wk).forEach(l=>{
    const bestE1RM=getBestE1RMForExercise(l.ex,4,wk);
    const rir=estimateRIR(l,bestE1RM);
    const effReps=getEffectiveReps(rir);
    const mw=getMuscleWeights(l.ex);
    const contrib=Object.keys(mw).reduce((s,m)=>s+(mw[m]||0),0)||1;
    if(effReps>=2)total+=contrib;
  });
  return Math.round(total*10)/10;
}
function getTotalHardSets(wk){
  let total=0;
  ST.logs.filter(l=>l.wk===wk).forEach(l=>{
    const bestE1RM=getBestE1RMForExercise(l.ex,4,wk);
    const rir=estimateRIR(l,bestE1RM);
    const effReps=getEffectiveReps(rir);
    const mw=getMuscleWeights(l.ex);
    const contrib=Object.keys(mw).reduce((s,m)=>s+(mw[m]||0),0)||1;
    if(effReps>=2||(bestE1RM==null&&isHardSet(l)))total+=contrib;
  });
  return Math.round(total*10)/10;
}
function getTotalHardSetsRecent(wk,numWeeks=2){
  let total=0;
  for(let w=Math.max(1,wk-numWeeks+1);w<=wk;w++)total+=getTotalHardSets(w);
  return total;
}
function getMedianRIR(wk){
  const rirs=[];
  ST.logs.filter(l=>l.wk===wk).forEach(l=>{
    const rir=estimateRIR(l,getBestE1RMForExercise(l.ex,4,wk));
    if(rir!=null)rirs.push(rir);
  });
  if(!rirs.length)return null;
  rirs.sort((a,b)=>a-b);
  return rirs[Math.floor(rirs.length/2)];
}
function getScheduleForWeek(wk){const def={};DO.forEach(dk=>{def[dk]=dk==='fri'?'rest':dk});return def}
function getDayProgram(dk){
  const mapped=getScheduleForWeek(ST.wk)[dk]||dk;
  if(mapped==='rest')return{key:dk,name:DAY_NAMES[dk],rest:true,focus:'Rest',exercises:[]};
  const base=P[mapped];
  if(!base||base.rest)return{key:dk,name:DAY_NAMES[dk],rest:true,exercises:[]};
  return{...base,key:dk,name:DAY_NAMES[dk],exercises:base.exercises.map(e=>({...e,displayName:e.name}))};
}

const VERDICT_ENUM = ['PROGRESSING','STALL_LOCAL','STALL_SYSTEMIC','UNDERSTIMULATED','OVERREACHED','DELOAD_RECOMMENDED','DATA_INSUFFICIENT'];

function mk(override) {
  const base = { date:'2025-02-10', dk:'mon', dn:'Monday', wk:1, bl:1, ex:'Hack Squat', sn:1, w:200, r:8, rpe:8, e1rm:253 };
  const r = { ...base, ...override };
  if (r.w && r.r && !r.e1rm) r.e1rm = Math.round(r.w * (1 + r.r/30));
  return r;
}
function requireFullWeek(wk, opts) {
  opts = opts || {};
  const days = [
    { dk:'mon', exs:['Hack Squat','Single Leg Press','Leg Extension','Seated Leg Curl','Standing Calf Raise','Seated Calf Raise'] },
    { dk:'tue', exs:['Barbell Bench Press','Incline Dumbbell Press','Cable Fly','Weighted Pull-Up','Plate Loaded Machine Row','Lat Pullover','Face Pull'] },
    { dk:'wed', exs:['Barbell Curl','Incline Dumbbell Curl','Cable Hammer Curl','Close Grip Bench Press','Overhead Tricep Extension','Cable Pushdown','Lateral Raise Machine','Rear Delt Fly'] },
    { dk:'thu', exs:['Belt Squat','Romanian Deadlift','Nordic Hamstring Curl','Leg Press','Leg Extension','Hip Abductor Machine','Standing Calf Raise','Seated Calf Raise'] },
    { dk:'sat', exs:['Incline Barbell Press','Cable Fly','Hammer Curl','Cable Curl','Incline Dumbbell Curl','Spider Curl','Skull Crusher','Dumbbell Overhead Extension'] },
    { dk:'sun', exs:['Leg Press','Hack Squat','Leg Extension','Stiff Leg Deadlift','Lying Leg Curl','Hip Abductor Machine','Standing Calf Raise'] }
  ];
  const dn = { mon:'Monday', tue:'Tuesday', wed:'Wednesday', thu:'Thursday', sat:'Saturday', sun:'Sunday' };
  const hash = (s) => (s||'').split('').reduce((a,c)=>a+c.charCodeAt(0),0);
  let logs = [];
  days.forEach((d, i) => {
    const date = '2025-02-' + (10 + i);
    d.exs.forEach(ex => {
      const sets = ex.includes('Calf') ? 3 : 4;
      const w = opts.baseWeight != null ? opts.baseWeight : 140 + (hash(ex) % 80) + wk * 3;
      for (let s = 0; s < sets; s++) logs.push(mk({ date, dk: d.dk, dn: dn[d.dk], wk, ex, sn: s+1, w, r: opts.reps || 8, rpe: opts.rpe != null ? opts.rpe : 7.5 }));
    });
  });
  return logs;
}

function toContractOutput(raw) {
  const out = { verdict: 'PROGRESSING', signals: [], plan: [], guardrails: [], confidence: 50 };
  const { globalState, globalResponse, recs, weekVerdict, weeksLogged, hasRPE, core, isDeload } = raw;

  if (raw.global?.verdict && VERDICT_ENUM.includes(raw.global.verdict)) {
    out.verdict = raw.global.verdict;
  } else if (weeksLogged < 2) {
    out.verdict = 'DATA_INSUFFICIENT';
    out.confidence = 95;
  } else if (isDeload || globalResponse === 'deload') {
    out.verdict = 'DELOAD_RECOMMENDED';
    out.confidence = 85;
  } else if (recs.some(r => r.type === 'junk_volume')) {
    out.verdict = 'OVERREACHED';
    out.confidence = 85;
  } else if (recs.some(r => r.type === 'systemic_reduce') || (raw.global?.stalledCount >= 2 && globalResponse === 'reduce')) {
    out.verdict = 'STALL_SYSTEMIC';
    out.confidence = 80;
  } else if (globalResponse === 'reduce' && recs.some(r => r.type === 'reduce_volume')) {
    out.verdict = 'OVERREACHED';
    out.confidence = 80;
  } else if (recs.some(r => r.type === 'stall') && raw.global?.stalledCount === 1) {
    out.verdict = 'STALL_LOCAL';
    out.confidence = 80;
  } else if (recs.some(r => r.type === 'add_volume') || recs.some(r => r.type === 'proximity_priority')) {
    out.verdict = 'UNDERSTIMULATED';
    out.confidence = 75;
  } else if (globalState === 'improving' && globalResponse === 'expand') {
    out.verdict = 'PROGRESSING';
    out.confidence = 85;
  } else {
    out.verdict = 'PROGRESSING';
    out.confidence = 70;
  }

  const signals = [];
  if (core?.e1rmTrend) {
    signals.push(`e1RM trend ${core.e1rmTrend.trend} (${core.e1rmTrend.pctChange!=null?core.e1rmTrend.pctChange.toFixed(1):'—'}%)`);
  }
  if (core?.systemicFatigue != null) signals.push(`Systemic fatigue score ${core.systemicFatigue.toFixed(0)}`);
  recs.filter(r => r.type === 'stall').slice(0, 1).forEach(s => signals.push(`${s.ex} stalled at ${s.weight} since ${s.since}`));
  recs.filter(r => r.type === 'junk_volume').forEach(r => signals.push(r.reason));
  recs.filter(r => r.type === 'proximity_priority').slice(0, 1).forEach(r => signals.push(r.reason));
  out.signals = signals.slice(0, 3);

  const plan = [];
  if (recs.some(r => r.type === 'deload_plan')) plan.push('Deload: 40–60% sets, 60–70% load, RIR 3–5, no failure sets');
  recs.filter(r => r.type === 'add_volume').forEach(r => plan.push(`Change sets: add ~${r.add||1} quality sets for ${r.muscle}`));
  recs.filter(r => r.type === 'over_ceiling').forEach(r => plan.push(`Reduce ${r.muscle} sets 25–40%`));
  recs.filter(r => r.type === 'proximity_priority').forEach(r => plan.push(`Keep sets, increase intensity/proximity for ${r.muscle}`));
  recs.filter(r => r.type === 'stall').forEach(s => plan.push(`Swap/vary ${s.ex} or change rep bracket`));
  recs.filter(r => r.type === 'hold_volume').slice(0, 2).forEach(r => plan.push(`Hold ${r.muscle} volume`));
  recs.filter(r => ['junk_volume','systemic_reduce','reduce_volume'].includes(r.type)).forEach(r => plan.push(r.reason));
  (raw.dayDetails || []).forEach(dd => (dd.exTips || []).forEach(et => {
    if (et.swapOptions?.length) plan.push(`Swap to: ${et.swapOptions.slice(0, 3).join(', ')}`);
    if (et.modulation?.action === 'SWAP_OR_VARY') plan.push(`Swap or vary ${et.displayName || et.ex}`);
  }));
  out.plan = [...new Set(plan)];

  const guards = [];
  if (globalResponse === 'reduce' || raw.global?.mustReduce) guards.push('No added volume anywhere — systemic fatigue high');
  if (recs.some(r => r.type === 'stall')) guards.push('Consider exercise swap only if stall persists 2+ weeks');
  guards.push('Max 2 failure sets per session recommended');
  out.guardrails = guards;

  if (!hasRPE) out.confidence = Math.max(30, out.confidence - 25);
  if (weeksLogged < 4) out.confidence = Math.min(out.confidence, 70);

  return out;
}

function normalizeVerdict(v) {
  const s = (v || '').toString().trim().toUpperCase();
  return VERDICT_ENUM.includes(s) ? s : v;
}

function scoreScenario(contract, expected) {
  let verdictScore = 0, planScore = 0, formatScore = 0;
  const diffNotes = [];

  const expectedRaw = expected.expectedVerdict;
  const actualRaw = contract.verdict;
  const expectedNorm = normalizeVerdict(expectedRaw);
  const actualNorm = normalizeVerdict(actualRaw);
  const verdictMatch = expectedNorm === actualNorm;
  verdictScore = verdictMatch ? 40 : (VERDICT_ENUM.includes(actualNorm) ? 20 : 0);
  if (!verdictMatch) {
    diffNotes.push(`Verdict: expected ${expectedRaw}, got ${actualRaw}`);
    diffNotes.push(`[DEBUG] expectedNorm=${expectedNorm} actualNorm=${actualNorm}`);
  }

  const plan = contract.plan.join(' ').toLowerCase();
  const hasCorrectLever = expected.expectedLevers.length === 0 || expected.expectedLevers.some(lever => {
    if (lever === 'no_volume_changes') return !plan.includes('add') && !plan.includes('reduce');
    if (lever === 'add_volume') return plan.includes('add') || plan.includes('+');
    if (lever === 'proximity') return plan.includes('proximity') || plan.includes('intensity');
    if (lever === 'bench_tweak' || lever === 'no_global_reduce') return plan.includes('stall') || plan.includes('swap') || plan.includes('vary');
    if (lever === 'reduce' || lever === 'deload') return plan.includes('reduce') || plan.includes('deload');
    if (lever === 'reduce_volume' || lever === 'keep_intensity') return plan.includes('reduce');
    if (lever === 'reduce_day3' || lever === 'pump_day3') return plan.includes('3rd') || plan.includes('drop') || plan.includes('pump');
    if (lever === 'nutrition_check' || lever === 'no_add_sets') return !plan.includes('add') || plan.includes('nutrition') || plan.includes('recovery');
    if (lever === 'hold' || lever === 'recovery') return plan.includes('hold') || plan.includes('recovery') || plan.includes('deload');
    if (lever === 'swap' || lever === 'substitute') return plan.includes('swap') || plan.toLowerCase().includes('leg press') || plan.toLowerCase().includes('hack squat');
    if (lever === 'progression') return plan.length >= 0;
    return false;
  });
  planScore = hasCorrectLever ? 40 : (plan.length > 0 ? 15 : 0);
  if (!hasCorrectLever && expected.expectedLevers.length) diffNotes.push(`Plan: missing expected lever (${expected.expectedLevers.join(' or ')})`);

  const hasFormat = contract.verdict && Array.isArray(contract.signals) && Array.isArray(contract.plan) && Array.isArray(contract.guardrails) && typeof contract.confidence === 'number';
  formatScore = hasFormat ? 20 : 10;

  const violatesGuard = expected.guardViolations.some(g => {
    if (g === 'add_volume_during_fatigue') return (expected.expectedVerdict === 'OVERREACHED' || expected.expectedVerdict === 'STALL_SYSTEMIC') && plan.includes('add');
    if (g === 'panic_cut') return contract.verdict === 'OVERREACHED' && expected.expectedVerdict === 'DELOAD_RECOMMENDED';
    return false;
  });
  if (violatesGuard) { planScore = Math.max(0, planScore - 20); diffNotes.push('Guard violation'); }

  const total = verdictScore + planScore + formatScore;
  // Pass = strict verdict match (harness fix: no plan/format flip when verdicts agree)
  const pass = verdictMatch;

  return {
    pass, score: total, verdictScore, planScore, formatScore, diffNotes,
    verdictMatch, expectedRaw, actualRaw, expectedNorm, actualNorm
  };
}

function assertSignalSanity(signals) {
  const failed = [];
  if (signals.e1rmSlopePct != null && Math.abs(signals.e1rmSlopePct) > 30) failed.push('e1RM_slope_abs>30');
  if (signals.fatigue != null && (signals.fatigue < 0 || signals.fatigue > 100)) failed.push('fatigue_out_of_range');
  if (signals.effectiveSetsThisWeek != null && signals.effectiveSetsThisWeek < 0) failed.push('effSets_negative');
  if (signals.medianRIR != null && (signals.medianRIR < -1 || signals.medianRIR > 10)) failed.push('medianRIR_out_of_range');
  if (signals.volumeDeltaPct != null && Math.abs(signals.volumeDeltaPct) > 100) failed.push('volDelta_absurd');
  return failed;
}

function assertPlanGuardrails(verdict, plan) {
  const failed = [];
  const planStr = (plan || []).map(p => (typeof p === 'object' ? p.type : p)).join(' ').toLowerCase();
  if (verdict === 'PROGRESSING' && (planStr.includes('reduce_muscle') || planStr.includes('global_reduce'))) failed.push('PROGRESSING_no_reduce_in_plan');
  if (verdict === 'STALL_LOCAL' && (planStr.includes('global_reduce') || planStr.includes('deload'))) failed.push('STALL_LOCAL_no_global_reduce');
  if (verdict === 'UNDERSTIMULATED') {
    const hasAdd = planStr.includes('add') || planStr.includes('go_full') || planStr.includes('proximity') || planStr.includes('intensity');
    if (!hasAdd) failed.push('UNDERSTIMULATED_must_include_add_or_proximity');
  }
  if (verdict === 'DELOAD_RECOMMENDED' && !planStr.includes('deload')) failed.push('DELOAD_must_include_deload_prescription');
  return failed;
}

function extractNormalizedPlan(recs, dayDetails, verdict) {
  const plan = [];
  const allowReduce = verdict !== 'PROGRESSING';
  if (recs.some(r => r.type === 'deload_plan')) plan.push({ type: 'DELOAD', amountPct: 40, loadPct: 65 });
  recs.filter(r => r.type === 'add_volume').forEach(r => plan.push({ type: 'ADD_SET', muscle: r.muscle, amount: r.add || 1 }));
  if (allowReduce) recs.filter(r => r.type === 'over_ceiling').forEach(r => plan.push({ type: 'REDUCE_MUSCLE', muscle: r.muscle, amountPct: 25 }));
  recs.filter(r => r.type === 'proximity_priority').forEach(r => plan.push({ type: 'INCREASE_PROXIMITY', muscle: r.muscle }));
  recs.filter(r => r.type === 'stall').forEach(s => plan.push({ type: 'SWAP_OR_VARY', exercise: s.ex }));
  if (allowReduce) recs.filter(r => ['junk_volume','systemic_reduce','reduce_volume'].includes(r.type)).forEach(r => plan.push({ type: 'GLOBAL_REDUCE', reason: r.type }));
  (dayDetails || []).forEach(dd => (dd.exTips || []).forEach(et => {
    if (et.modulation?.action === 'SWAP_OR_VARY') plan.push({ type: 'SWAP_OR_VARY', exercise: et.displayName || et.ex });
  }));
  return plan;
}

function runScenario(scen, seed) {
  const logs = seed != null ? addNoise(scen.logs, seed) : (scen.logs || []);
  ST.logs = Array.isArray(logs) ? [...logs] : [];
  ST.wk = scen.wk;
  ST.smartWk = scen.wk;
  const raw = computeSmartRecommendations(scen.wk);
  const contract = toContractOutput(raw);
  const g = raw.global || {};
  const signals = {
    fatigue: g.fatigue, effectiveSetsThisWeek: g.effectiveSetsThisWeek, medianRIR: g.medianRIR,
    volumeDeltaPct: g.volumeDeltaPct, e1rmSlopePct: g.e1rmSlopePct,
    weeksUsedForE1RM: g.weeksUsedForE1RM, e1rmFlatWeeks: g.e1rmFlatWeeks, fatigueRisingWoW: g.fatigueRisingWoW
  };
  const plan = extractNormalizedPlan(raw.recs || [], raw.dayDetails, contract.verdict);
  const sanityFailed = assertSignalSanity(signals);
  const guardrailFailed = assertPlanGuardrails(contract.verdict, plan);
  return { verdict: contract.verdict, confidence: contract.confidence, signals, plan, ruleTrace: g.ruleTrace || [], sanityFailed: [...sanityFailed, ...guardrailFailed] };
}

function addNoise(logs, seed) {
  const rnd = (min, max) => min + (Math.sin(seed * 999 + logs.length) * 0.5 + 0.5) * (max - min);
  return logs.map(l => {
    const nl = { ...l };
    if (l.w) nl.w = Math.round(l.w * (1 + rnd(-0.025, 0.025)));
    if (l.r) nl.r = Math.max(1, Math.min(15, parseInt(l.r,10) + Math.round(rnd(-1, 1))));
    if (l.rpe != null) nl.rpe = Math.max(5, Math.min(10, l.rpe + rnd(-0.5, 0.5)));
    if (nl.w && nl.r && !nl.e1rm) nl.e1rm = Math.round(nl.w * (1 + nl.r/30));
    return nl;
  });
}

// ═══════════════════════════════════════════════════════════
// RUN VALIDATION — Direct computeSmartRecommendations (no iframe)
// ═══════════════════════════════════════════════════════════
function runValidation() {
  const report = document.getElementById('REPORT');
  try {
    report.textContent = 'Running validation…';
    const results = [];
    VALIDATION_SCENARIOS.forEach(scen => {
      const decision = runScenario(scen, null);
      const planArr = (decision.plan || []).map(p => (p.type + (p.exercise ? ' ' + p.exercise : '') + (p.muscle ? ' ' + p.muscle : '')).trim()).filter(Boolean);
      const scoring = scoreScenario({ verdict: decision.verdict, plan: planArr, signals: [], guardrails: [], confidence: 80 }, scen);
      const sanityFail = decision.sanityFailed.length;
      const pass = scoring.pass; // verdict-only: pass = (expected.verdict === actual.verdict)
      if (sanityFail) scoring.diffNotes.push('Signal sanity: ' + decision.sanityFailed.join(', '));
      results.push({
        id: scen.id,
        name: scen.name,
        expectedVerdict: scen.expectedVerdict,
        actualVerdict: decision.verdict,
        score: scoring.score,
        pass,
        diffNotes: scoring.diffNotes,
        signals: decision.signals,
        plan: decision.plan,
        ruleTrace: decision.ruleTrace,
        assertionsFailed: decision.sanityFailed,
        scoring,
        contract: { verdict: decision.verdict, plan: decision.plan, signals: [], guardrails: [], confidence: decision.confidence }
      });
    });

    let out = 'ENGINE VALIDATION REPORT (Golden Fixture Harness)\n';
    out += `Generated: ${new Date().toISOString()}\n`;
    out += '═'.repeat(80) + '\n\n';

    out += 'A) SUMMARY TABLE\n';
    out += 'scenarioId | expected        | actual          | pass | fatigue | effSets | RIR  | volΔ    | e1RM    | top plan\n';
    out += '─'.repeat(100) + '\n';
    results.forEach(r => {
      const s = r.signals || {};
      const fatigue = s.fatigue != null ? String(s.fatigue) : '—';
      const eff = s.effectiveSetsThisWeek != null ? s.effectiveSetsThisWeek.toFixed(1) : '—';
      const rir = s.medianRIR != null ? s.medianRIR.toFixed(1) : '—';
      const vol = s.volumeDeltaPct != null ? (s.volumeDeltaPct >= 0 ? '+' : '') + s.volumeDeltaPct.toFixed(1) + '%' : '—';
      const e1 = s.e1rmSlopePct != null ? (s.e1rmSlopePct >= 0 ? '+' : '') + s.e1rmSlopePct.toFixed(1) + '%' : '—';
      const topPlan = (r.plan || []).slice(0, 2).map(p => p.type).join(', ');
      out += `${(r.id || r.name).toString().padEnd(10)} | ${r.expectedVerdict.padEnd(15)} | ${r.actualVerdict.padEnd(15)} | ${(r.pass ? 'PASS' : 'FAIL').padEnd(4)} | ${fatigue.padEnd(6)} | ${eff.padEnd(6)} | ${rir.padEnd(4)} | ${vol.padEnd(7)} | ${e1.padEnd(6)} | ${topPlan}\n`;
    });
    out += '\n';

    const passed = results.filter(r => r.pass).length;
    out += `TOTAL: ${passed}/${results.length} scenarios passed\n\n`;

    out += 'B) PER-SCENARIO JSON (one JSON object per line)\n';
    out += '─'.repeat(80) + '\n';
    const jsonLines = [];
    results.forEach(r => {
      const obj = {
        scenarioId: r.id,
        expected: { verdict: r.expectedVerdict },
        actual: { verdict: r.actualVerdict },
        pass: r.pass,
        signals: r.signals,
        plan: r.plan,
        assertionsFailed: r.assertionsFailed || []
      };
      if (!r.pass && r.scoring) obj.debug = { expectedRaw: r.scoring.expectedRaw, actualRaw: r.scoring.actualRaw, expectedNorm: r.scoring.expectedNorm, actualNorm: r.scoring.actualNorm };
      jsonLines.push(JSON.stringify(obj));
      out += JSON.stringify(obj) + '\n';
    });
    window.__lastValidationJson = jsonLines;

    const failed = results.filter(r => !r.pass);
    if (failed.length > 0) {
      out += '\nFAILING SCENARIOS (2 worst)\n';
      out += '═'.repeat(80) + '\n';
      failed.slice(0, 2).forEach(r => {
        out += `\n--- ${r.name} ---\n`;
        out += `Verdict: ${r.actualVerdict} (expected ${r.expectedVerdict})\n`;
        const sig = r.signals || {};
        out += `Signals: fatigue=${sig.fatigue} effSets=${sig.effectiveSetsThisWeek} medianRIR=${sig.medianRIR} volΔ=${sig.volumeDeltaPct != null ? sig.volumeDeltaPct + '%' : 'null'} e1RM=${sig.e1rmSlopePct}%\n`;
        out += `Debug: weeksUsedForE1RM=${sig.weeksUsedForE1RM} e1rmFlatWeeks=${sig.e1rmFlatWeeks} fatigueRisingWoW=${sig.fatigueRisingWoW}\n`;
        out += `ruleTrace: ${JSON.stringify(r.ruleTrace || [])}\n`;
        if (r.scoring?.expectedRaw != null) out += `[DEBUG] expectedRaw=${r.scoring.expectedRaw} actualRaw=${r.scoring.actualRaw} expectedNorm=${r.scoring.expectedNorm} actualNorm=${r.scoring.actualNorm}\n`;
        out += `Plan: ${r.plan?.map(p => JSON.stringify(p)).join(' | ')}\n`;
        out += `AssertionsFailed: ${(r.assertionsFailed || []).join(', ')}\n`;
        out += `Diff: ${r.diffNotes.join('; ')}\n`;
      });
    }

    report.textContent = out;
  } catch (e) {
    report.textContent = 'Error: ' + (e.message || e) + '\n\nStack: ' + (e.stack || '');
  }
}

const STABILITY_SEEDS = 20;
const STABILITY_MODE_PCT = 0.7;

function runStabilityTests() {
  const report = document.getElementById('REPORT');
  try {
    const stabilityResults = [];
    const scenariosToTest = VALIDATION_SCENARIOS.filter(s => s.logs.length > 10);

    scenariosToTest.forEach(scen => {
      const verdicts = [];
      const verdictCounts = {};
      for (let run = 0; run < STABILITY_SEEDS; run++) {
        const decision = runScenario(scen, run * 17 + (scen.id || '').length);
        verdicts.push(decision.verdict);
        verdictCounts[decision.verdict] = (verdictCounts[decision.verdict] || 0) + 1;
      }
      const modeVerdict = Object.entries(verdictCounts).sort((a, b) => b[1] - a[1])[0];
      const modeFreq = modeVerdict ? modeVerdict[1] / STABILITY_SEEDS : 0;
      const pass = modeFreq >= STABILITY_MODE_PCT;
      stabilityResults.push({
        name: scen.name,
        verdicts,
        verdictDistribution: verdictCounts,
        modeVerdict: modeVerdict ? modeVerdict[0] : '—',
        modeFreq: (modeFreq * 100).toFixed(0) + '%',
        pass,
        knifeEdge: !pass && modeFreq >= 0.5
      });
    });

    let out = 'STABILITY (NOISE) TEST REPORT — 20 seeds, 70% mode required\n';
    out += `Generated: ${new Date().toISOString()}\n`;
    out += 'Noise: reps ±1, load ±2.5%, RPE ±0.5\n';
    out += '═'.repeat(80) + '\n\n';
    stabilityResults.forEach(r => {
      const status = r.pass ? 'STABLE' : (r.knifeEdge ? 'KNIFE-EDGE' : 'UNSTABLE');
      out += `${r.name}: mode=${r.modeVerdict} (${r.modeFreq}) — ${status}\n`;
      out += `  Distribution: ${JSON.stringify(r.verdictDistribution)}\n`;
    });
    const stableCount = stabilityResults.filter(r => r.pass).length;
    out += `\nTOTAL: ${stableCount}/${stabilityResults.length} scenarios verdict-stable (≥70% mode)\n`;

    report.textContent = out;
  } catch (e) {
    report.textContent = 'Error: ' + (e.message || e);
  }
}

function copyReport() {
  const ta = document.createElement('textarea');
  ta.value = document.getElementById('REPORT').textContent;
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
}

function downloadReport() {
  const txt = document.getElementById('REPORT').textContent;
  const blob = new Blob([txt], { type: 'text/markdown' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'VALIDATION-OUTPUT.md';
  a.click();
  URL.revokeObjectURL(a.href);
}

// Auto-run on load
(function init() {
  var reportEl = document.getElementById('REPORT');
  if (!reportEl) return;
  reportEl.textContent = 'Engine ready. Auto-running validation and stability tests…';
  setTimeout(function() {
    runValidation();
    var valReport = document.getElementById('REPORT').textContent;
    setTimeout(function() {
      runStabilityTests();
      var stabReport = document.getElementById('REPORT').textContent;
      var combined = valReport + '\n\n---\n\n## STABILITY TESTS\n\n' + stabReport;
      reportEl.textContent = combined;
    }, 200);
  }, 300);
})();
